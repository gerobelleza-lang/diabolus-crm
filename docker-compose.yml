# Postgres para v39.1 (PostgresRepo). v39 funciona sin esto (repo en memoria).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: diabolus
      POSTGRES_USER: diabolus
      POSTGRES_PASSWORD: cambiar_en_local
    ports:
      - "5432:5432"
    volumes:
      - diabolus_data:/var/lib/postgresql/data
volumes:
  diabolus_data:

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diabolus CRM — Historial Cazador</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <style>
    body { margin: 0; padding: 2rem; background: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { margin: 0 0 2rem; }
    .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .filter-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .filter-group label { font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); }
    select, input { padding: 0.625rem; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 0.5rem; color: var(--text-primary); }
    select:focus, input:focus { outline: none; border-color: var(--primary); }
    .btn { padding: 0.625rem 1.25rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; }
    .btn:hover { opacity: 0.9; }
    .table-wrapper { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 0.75rem; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--bg-tertiary); }
    th { padding: 1rem; text-align: left; font-size: 0.875rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; }
    td { padding: 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.875rem; }
    tbody tr:hover { background: var(--bg-tertiary); }
    .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; }
    .badge-level1 { background: rgba(34,197,94,0.15); color: #22c55e; } /* 🟢 green */
    .badge-level2 { background: rgba(245,158,11,0.15); color: #f59e0b; } /* 🟡 amber */
    .badge-level3 { background: rgba(239,68,68,0.15); color: #ef4444; } /* 🔴 red */
    .badge-friendly { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-direct { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .badge-formal { background: rgba(239,68,68,0.15); color: #ef4444; }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-tertiary); }
    .loading { text-align: center; padding: 2rem; color: var(--text-secondary); }
    .back-link { display: inline-block; margin-bottom: 1rem; color: var(--primary); text-decoration: none; font-weight: 600; }
    .back-link:hover { text-decoration: underline; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 1rem; }
    .stat-label { font-size: 0.75rem; color: var(--text-tertiary); }
    .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 0.5rem; }
  </style>
  <link rel="stylesheet" href="diabolus-tokens.css">
</head>
<body>
<div class="container">
  <a href="dashboard.html" class="back-link">← Volver</a>
  <h1>🦅 Historial Cazador — Recordatorios Enviados</h1>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total enviados</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Este mes</div>
      <div class="stat-value" id="statMonth">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Últimos 7 días</div>
      <div class="stat-value" id="statWeek">—</div>
    </div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Cliente</label>
      <select id="filterClient" onchange="applyFilters()">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Nivel</label>
      <select id="filterLevel" onchange="applyFilters()">
        <option value="">Todos</option>
        <option value="1">Nivel 1 (🟢 Amable)</option>
        <option value="2">Nivel 2 (🟡 Directo)</option>
        <option value="3">Nivel 3 (🔴 Formal)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Desde</label>
      <input type="date" id="filterFrom" onchange="applyFilters()">
    </div>
    <div class="filter-group">
      <label>Hasta</label>
      <input type="date" id="filterTo" onchange="applyFilters()">
    </div>
  </div>

  <div class="table-wrapper">
    <div id="tableContainer">
      <div class="loading">⏳ Cargando...</div>
    </div>
  </div>
</div>

<script>
const API = 'https://diabolus-crm-api.vercel.app';
const _auth = JSON.parse(localStorage.getItem('diabolus_auth') || 'null');
let token = _auth?.token || null;
let allHistory = [];
let allClients = [];

if (!token) { window.location.href = 'index-login.html'; }

async function apiGet(path) {
  const r = await fetch(API + path, { headers: { Authorization: `Bearer ${token}` } });
  if (r.status === 401) { localStorage.removeItem('diabolus_auth'); window.location.href = 'index-login.html'; }
  return r.json();
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function formatTone(tone) {
  const toneMap = {
    'friendly': { emoji: '💚', label: 'Amable', class: 'badge-friendly' },
    'direct': { emoji: '🟠', label: 'Directo', class: 'badge-direct' },
    'formal': { emoji: '🔴', label: 'Formal', class: 'badge-formal' },
  };
  const t = toneMap[tone] || { emoji: '❓', label: tone, class: '' };
  return `<span class="badge ${t.class}">${t.emoji} ${t.label}</span>`;
}

function formatLevel(level) {
  const levels = {
    1: { emoji: '🟢', label: 'L1', class: 'badge-level1' },
    2: { emoji: '🟡', label: 'L2', class: 'badge-level2' },
    3: { emoji: '🔴', label: 'L3', class: 'badge-level3' },
  };
  const l = levels[level] || { emoji: '❓', label: level, class: '' };
  return `<span class="badge ${l.class}">${l.emoji} ${l.label}</span>`;
}

async function loadData() {
  try {
    const data = await apiGet('/api/cazador/history');
    allHistory = data.history || [];
    await loadClients();
    renderTable(allHistory);
    updateStats(allHistory);
  } catch(e) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state">❌ Error al cargar historial</div>';
  }
}

async function loadClients() {
  try {
    const data = await apiGet('/api/clients');
    allClients = data.clients || [];
    const select = document.getElementById('filterClient');
    allClients.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name || 'Sin nombre';
      select.appendChild(opt);
    });
  } catch(e) {}
}

function applyFilters() {
  const clientId = document.getElementById('filterClient').value;
  const level = document.getElementById('filterLevel').value;
  const from = document.getElementById('filterFrom').value;
  const to = document.getElementById('filterTo').value;

  let filtered = allHistory;
  if (clientId) filtered = filtered.filter(h => h.client_id === clientId);
  if (level) filtered = filtered.filter(h => h.level === parseInt(level));
  if (from) filtered = filtered.filter(h => new Date(h.sent_at) >= new Date(from));
  if (to) filtered = filtered.filter(h => new Date(h.sent_at) <= new Date(to + 'T23:59:59'));

  renderTable(filtered);
  updateStats(filtered);
}

function renderTable(items) {
  if (!items.length) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state">📭 No hay recordatorios que mostrar</div>';
    return;
  }

  const rows = items.map(h => `
    <tr>
      <td><strong>${h.client_name}</strong></td>
      <td>${fmtDate(h.sent_at)}</td>
      <td>${formatLevel(h.level)}</td>
      <td>${formatTone(h.tone)}</td>
      <td><small>${h.channel === 'email' ? '📧 Email' : '💬 Telegram'}</small></td>
      <td style="max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.message || '—'}</td>
    </tr>
  `).join('');

  document.getElementById('tableContainer').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Fecha</th>
          <th>Nivel</th>
          <th>Tono</th>
          <th>Canal</th>
          <th>Mensaje</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function updateStats(items) {
  const now = new Date();
  const monthAgo = new Date(now.getFullYear(), now.getMonth(), 1);
  const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

  const thisMonth = items.filter(h => new Date(h.sent_at) >= monthAgo).length;
  const thisWeek = items.filter(h => new Date(h.sent_at) >= weekAgo).length;

  document.getElementById('statTotal').textContent = items.length;
  document.getElementById('statMonth').textContent = thisMonth;
  document.getElementById('statWeek').textContent = thisWeek;
}

loadData();
</script>
</body>
</html>

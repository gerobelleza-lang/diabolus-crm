<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat con tu gestor · Diabolus CRM</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;height:100vh;display:flex;flex-direction:column}
  .header{background:#111;border-bottom:1px solid #222;padding:16px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .header .logo{font-size:18px;font-weight:800;color:#dc2626}
  .header .title{font-size:15px;color:#fff;font-weight:600}
  .header .subtitle{font-size:12px;color:#666}
  .header .back{margin-left:auto;color:#666;text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid #333;border-radius:6px}
  .header .back:hover{background:#1a1a1a;color:#fff}
  .threads-panel{background:#111;border-bottom:1px solid #222;padding:12px 24px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0}
  .thread-chip{background:#1a1a1a;border:1px solid #333;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap;position:relative}
  .thread-chip.active{border-color:#dc2626;color:#dc2626}
  .thread-chip .badge{background:#dc2626;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:6px}
  .no-threads{color:#555;font-size:13px;padding:8px 0}
  .chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
  .msg{display:flex;flex-direction:column;max-width:75%}
  .msg.client{align-self:flex-end;align-items:flex-end}
  .msg.gestor{align-self:flex-start;align-items:flex-start}
  .msg .bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-break:break-word}
  .msg.client .bubble{background:#dc2626;color:#fff;border-bottom-right-radius:4px}
  .msg.gestor .bubble{background:#1a1a1a;color:#ddd;border:1px solid #333;border-bottom-left-radius:4px}
  .msg .meta{font-size:11px;color:#555;margin-top:4px}
  .msg .attachment-link{display:inline-flex;align-items:center;gap:6px;background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:8px 12px;font-size:13px;color:#888;text-decoration:none;margin-top:6px;cursor:pointer}
  .msg .attachment-link:hover{border-color:#555;color:#ccc}
  .msg.client .attachment-link{color:#fca5a5;border-color:#7f1d1d}
  .composer{background:#111;border-top:1px solid #222;padding:16px 24px;flex-shrink:0}
  .composer-inner{display:flex;gap:10px;align-items:flex-end}
  .composer textarea{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;padding:10px 14px;font-size:14px;resize:none;min-height:44px;max-height:120px;font-family:inherit;outline:none}
  .composer textarea:focus{border-color:#555}
  .composer .attach-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:10px 14px;cursor:pointer;color:#666;font-size:18px;flex-shrink:0}
  .composer .attach-btn:hover{background:#222;color:#fff}
  .composer .send-btn{background:#dc2626;border:none;border-radius:10px;padding:10px 18px;color:#fff;font-weight:700;cursor:pointer;font-size:14px;flex-shrink:0}
  .composer .send-btn:disabled{opacity:0.4;cursor:not-allowed}
  .composer .file-preview{margin-top:8px;display:flex;align-items:center;gap:8px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:8px 12px}
  .composer .file-preview span{font-size:12px;color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .composer .file-preview button{background:none;border:none;color:#555;cursor:pointer;font-size:16px;padding:0}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#444;gap:8px}
  .empty-state .icon{font-size:48px}
  .loading{text-align:center;color:#555;padding:40px;font-size:13px}
  .no-link{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#555;gap:12px;padding:40px;text-align:center}
  .no-link .icon{font-size:48px}
  input[type=file]{display:none}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">🔥 DIABOLUS</div>
  </div>
  <div style="margin-left:12px">
    <div class="title">Chat con tu gestor</div>
    <div class="subtitle" id="current-gestor-name">Selecciona un gestor</div>
  </div>
  <a href="index-login.html" class="back">← Panel</a>
</div>

<div class="threads-panel" id="threads-panel">
  <span class="no-threads">Cargando…</span>
</div>

<div class="chat-container" id="chat-container">
  <div class="empty-state" id="empty-state">
    <div class="icon">💬</div>
    <div>Selecciona un gestor para ver el chat</div>
  </div>
</div>

<input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.xlsx,.xls,.docx,.doc,.csv,.zip">

<script>
const API = 'https://diabolus-crm-api.vercel.app'
let token = localStorage.getItem('diabolus_token')
let currentGestorId = null
let selectedFile = null
let pollInterval = null

if (!token) {
  alert('Debes iniciar sesión primero')
  location.href = 'index-login.html'
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { Authorization: `Bearer ${token}`, ...(opts.headers ?? {}) }
  })
  return res.json()
}

// ─── Cargar hilos ──────────────────────────────────────────────────────────────
async function loadThreads() {
  const panel = document.getElementById('threads-panel')
  const data = await api('/api/chat/threads')
  if (!data.ok || !data.threads?.length) {
    panel.innerHTML = '<span class="no-threads">No tienes gestores vinculados aún.</span>'
    return
  }
  panel.innerHTML = ''
  data.threads.forEach(t => {
    const chip = document.createElement('div')
    chip.className = 'thread-chip'
    chip.dataset.gestorId = t.gestor_id
    chip.innerHTML = `${t.gestor_name}${t.unread_count > 0 ? `<span class="badge">${t.unread_count}</span>` : ''}`
    chip.addEventListener('click', () => selectThread(t.gestor_id, t.gestor_name))
    panel.appendChild(chip)
  })
}

// ─── Seleccionar hilo ─────────────────────────────────────────────────────────
async function selectThread(gestorId, gestorName) {
  currentGestorId = gestorId
  document.getElementById('current-gestor-name').textContent = gestorName

  // Actualizar chips
  document.querySelectorAll('.thread-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.gestorId === gestorId)
    if (c.dataset.gestorId === gestorId) {
      const badge = c.querySelector('.badge')
      if (badge) badge.remove()
    }
  })

  await loadMessages()
  await markRead()

  // Montar compositor
  mountComposer()

  // Polling cada 10s
  if (pollInterval) clearInterval(pollInterval)
  pollInterval = setInterval(async () => {
    if (currentGestorId === gestorId) await loadMessages()
  }, 10000)
}

// ─── Cargar mensajes ──────────────────────────────────────────────────────────
async function loadMessages() {
  const container = document.getElementById('chat-container')
  const data = await api(`/api/chat/thread/${currentGestorId}`)
  if (!data.ok) return

  const msgs = data.messages ?? []
  if (!msgs.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><div>Sin mensajes aún. ¡Di hola!</div></div>'
    mountComposer()
    return
  }

  let html = '<div class="messages" id="messages-list">'
  msgs.forEach(m => {
    const sender = m.sender === 'client' ? 'client' : 'gestor'
    const label = m.sender === 'client' ? 'Tú' : 'Gestor'
    const time = new Date(m.created_at).toLocaleString('es-ES', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' })
    const unread = m.sender === 'gestor' && !m.read_at ? ' ●' : ''
    let inner = m.content ? `<div class="bubble">${escHtml(m.content)}</div>` : ''
    if (m.attachment_url) {
      inner += `<a class="attachment-link" href="${m.attachment_url}" target="_blank" download>📎 ${escHtml(m.attachment?.filename ?? 'Adjunto')}</a>`
    } else if (m.attachment?.filename) {
      inner += `<span class="attachment-link" data-msg-id="${m.id}">📎 ${escHtml(m.attachment.filename)} (clic para abrir)</span>`
    }
    html += `<div class="msg ${sender}"><div>${inner}</div><div class="meta">${label} · ${time}${unread}</div></div>`
  })
  html += '</div>'

  // Preservar compositor si existe
  const composer = document.getElementById('composer-area')
  container.innerHTML = html
  if (composer) container.appendChild(composer)
  else mountComposer()

  // Scroll al final
  const list = document.getElementById('messages-list')
  if (list) list.scrollTop = list.scrollHeight

  // Eventos para adjuntos sin URL firmada
  container.querySelectorAll('[data-msg-id]').forEach(el => {
    el.addEventListener('click', async () => {
      const res = await api(`/api/chat/attachment/${el.dataset.msgId}`)
      if (res.ok) window.open(res.url, '_blank')
    })
  })
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ─── Marcar leídos ────────────────────────────────────────────────────────────
async function markRead() {
  if (!currentGestorId) return
  await api(`/api/chat/thread/${currentGestorId}/read`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
}

// ─── Compositor ───────────────────────────────────────────────────────────────
function mountComposer() {
  const container = document.getElementById('chat-container')
  let composer = document.getElementById('composer-area')
  if (composer) return
  composer = document.createElement('div')
  composer.id = 'composer-area'
  composer.className = 'composer'
  composer.innerHTML = `
    <div class="composer-inner">
      <textarea id="msg-input" placeholder="Escribe un mensaje…" rows="1"></textarea>
      <button class="attach-btn" id="attach-btn" title="Adjuntar archivo">📎</button>
      <button class="send-btn" id="send-btn">Enviar</button>
    </div>
    <div id="file-preview" style="display:none"></div>
  `
  container.appendChild(composer)

  document.getElementById('attach-btn').addEventListener('click', () => document.getElementById('file-input').click())
  document.getElementById('file-input').addEventListener('change', onFileSelect)
  document.getElementById('send-btn').addEventListener('click', sendMessage)
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
  })
  // Auto-resize textarea
  document.getElementById('msg-input').addEventListener('input', function() {
    this.style.height = 'auto'
    this.style.height = Math.min(this.scrollHeight, 120) + 'px'
  })
}

function onFileSelect(e) {
  const file = e.target.files[0]
  if (!file) return
  if (file.size > 10 * 1024 * 1024) { alert('El archivo supera 10 MB'); return }
  selectedFile = file
  const preview = document.getElementById('file-preview')
  preview.style.display = 'flex'
  preview.innerHTML = `<div class="file-preview">📎 <span>${escHtml(file.name)} (${(file.size/1024).toFixed(0)} KB)</span><button onclick="clearFile()">✕</button></div>`
}

function clearFile() {
  selectedFile = null
  document.getElementById('file-preview').style.display = 'none'
  document.getElementById('file-input').value = ''
}

async function sendMessage() {
  const input = document.getElementById('msg-input')
  const btn = document.getElementById('send-btn')
  const text = input.value.trim()
  if (!text && !selectedFile) return

  btn.disabled = true
  btn.textContent = '…'

  try {
    let body, headers = {}
    if (selectedFile) {
      const fd = new FormData()
      if (text) fd.append('body', text)
      fd.append('file', selectedFile)
      body = fd
    } else {
      body = JSON.stringify({ body: text })
      headers['Content-Type'] = 'application/json'
    }

    const res = await fetch(`${API}/api/chat/thread/${currentGestorId}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, ...headers },
      body
    })
    const data = await res.json()
    if (!data.ok) { alert(data.error ?? 'Error enviando'); return }

    input.value = ''
    input.style.height = 'auto'
    clearFile()
    await loadMessages()
  } catch(err) {
    alert('Error de red: ' + err.message)
  } finally {
    btn.disabled = false
    btn.textContent = 'Enviar'
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadThreads()
</script>
</body>
</html>

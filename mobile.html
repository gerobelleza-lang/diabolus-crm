<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#050508">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diabolus">
  <link rel="manifest" href="manifest.json">
  <title>Diabolus</title>
  <style>
    /* ═══════════════════════════════
       RESET & TOKENS
    ═══════════════════════════════ */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    :root {
      --bg:          #050508;
      --surface:     rgba(255,255,255,0.04);
      --surface2:    rgba(255,255,255,0.07);
      --border:      rgba(255,255,255,0.08);
      --purple:      #9B76FB;
      --purple-dim:  rgba(155,118,251,0.15);
      --purple-glow: rgba(155,118,251,0.4);
      --neon-purple: #b794f6;
      --neon-cyan:   #67e8f9;
      --gold:        #E3BE7A;
      --text:        rgba(255,255,255,0.92);
      --text-dim:    rgba(255,255,255,0.38);
      --bubble-user: #7C5CFC;
      --bubble-ai:   rgba(255,255,255,0.06);
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text',
                   'Helvetica Neue', 'Segoe UI', sans-serif;
      overflow: hidden;
      position: fixed;
    }

    /* ═══════════════════════════════
       BACKGROUND — Subtle cyberpunk glow
    ═══════════════════════════════ */
    body::before {
      content: '';
      position: fixed;
      top: -30vh; left: 50%;
      transform: translateX(-50%);
      width: 80vw; height: 80vw;
      max-width: 500px; max-height: 500px;
      background: radial-gradient(circle, rgba(100,60,220,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20vh; right: -10vw;
      width: 50vw; height: 50vw;
      max-width: 300px; max-height: 300px;
      background: radial-gradient(circle, rgba(103,232,249,0.04) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════
       APP SHELL
    ═══════════════════════════════ */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      position: relative;
      z-index: 1;
    }

    /* ═══════════════════════════════
       HEADER — Minimal, clean
    ═══════════════════════════════ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      padding-top: calc(12px + var(--safe-top));
      flex-shrink: 0;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .dot-alive {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 6px #34d399;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .btn-header {
      background: none; border: none;
      color: var(--text-dim);
      font-size: 17px; cursor: pointer;
      padding: 6px 8px; line-height: 1;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .btn-header:active { background: rgba(255,255,255,0.06); }

    .btn-header.btn-dashboard {
      background: rgba(139,92,246,0.15);
      color: var(--purple);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      border: 1px solid rgba(139,92,246,0.25);
    }
    .btn-header.btn-dashboard:active {
      background: rgba(139,92,246,0.3);
    }

    .btn-header.muted { opacity: 0.35; }

    /* ═══════════════════════════════
       MESSAGES AREA
    ═══════════════════════════════ */
    .messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px 16px 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .messages::-webkit-scrollbar { display: none; }

    /* ═══════════════════════════════
       WELCOME SCREEN — Cyberpunk Clean
    ═══════════════════════════════ */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 20px 0 24px;
      gap: 0;
      text-align: center;
    }

    /* Neon greeting */
    .neon-greeting {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 4px;
      color: #fff;
      text-shadow:
        0 0 10px rgba(155,118,251,0.5),
        0 0 30px rgba(155,118,251,0.3),
        0 0 60px rgba(155,118,251,0.15);
      animation: neon-flicker 4s ease-in-out infinite;
    }

    .neon-sub {
      font-size: 15px;
      color: var(--text-dim);
      margin-bottom: 36px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    @keyframes neon-flicker {
      0%, 100% { text-shadow: 0 0 10px rgba(155,118,251,0.5), 0 0 30px rgba(155,118,251,0.3), 0 0 60px rgba(155,118,251,0.15); }
      50% { text-shadow: 0 0 14px rgba(155,118,251,0.65), 0 0 40px rgba(155,118,251,0.4), 0 0 80px rgba(155,118,251,0.2); }
    }

    /* Big voice button */
    .voice-hero {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .voice-hero-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(155,118,251,0.15);
      animation: hero-pulse 3s ease-in-out infinite;
    }
    .voice-hero-ring:nth-child(2) {
      inset: -24px;
      border-color: rgba(155,118,251,0.08);
      animation-delay: 0.5s;
    }

    @keyframes hero-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.6; }
    }

    .voice-hero-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(155,118,251,0.12), rgba(103,232,249,0.06));
      border: 1.5px solid rgba(155,118,251,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      color: var(--neon-purple);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 30px rgba(155,118,251,0.12), inset 0 0 20px rgba(155,118,251,0.05);
    }
    .voice-hero-btn:active {
      transform: scale(0.95);
      border-color: rgba(155,118,251,0.6);
      box-shadow: 0 0 50px rgba(155,118,251,0.25);
    }

    .voice-hero-label {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* Quick action buttons — big, clean, cyberpunk */
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 340px;
    }

    .quick-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 14px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      text-align: left;
      line-height: 1.3;
    }
    .quick-btn:active {
      background: var(--purple-dim);
      border-color: rgba(155,118,251,0.35);
      transform: scale(0.97);
    }
    .quick-btn .q-icon {
      font-size: 22px;
      flex-shrink: 0;
    }

    /* Dashboard link */
    .dashboard-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
    }
    .dashboard-link:active {
      background: var(--surface);
      color: var(--text);
    }

    /* ═══════════════════════════════
       CHAT BUBBLES
    ═══════════════════════════════ */
    .msg {
      display: flex;
      margin-bottom: 6px;
      animation: pop-in 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop-in {
      from { opacity:0; transform:translateY(10px) scale(0.96); }
      to   { opacity:1; transform:translateY(0)    scale(1);    }
    }

    .msg.user { justify-content: flex-end; }
    .msg.ai   { justify-content: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 11px 15px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.5;
    }

    .msg.user .bubble {
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg.ai .bubble {
      background: var(--bubble-ai);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 5px;
    }

    /* Diablo tag */
    .diablo-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: rgba(255,255,255,.45);
      margin-bottom: 3px;
      padding: 1px 6px;
      background: rgba(139,92,246,.08);
      border-radius: 10px;
      font-weight: 500;
    }
    .diablo-tag .diablo-emoji { font-size: 12px; }

    /* Typing dots */
    .typing .bubble {
      padding: 14px 18px;
      display: flex; gap: 5px; align-items: center;
    }
    .tdot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim);
      animation: tdot 1.2s ease infinite;
    }
    .tdot:nth-child(2){ animation-delay:.2s }
    .tdot:nth-child(3){ animation-delay:.4s }
    @keyframes tdot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ═══════════════════════════════
       INPUT BAR — Clean
    ═══════════════════════════════ */
    .input-bar {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 14px;
      padding-bottom: calc(10px + var(--safe-bottom));
      border-top: 1px solid var(--border);
      background: rgba(5,5,8,0.85);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
    }

    .btn-mic {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(155,118,251,0.12), rgba(103,232,249,0.06));
      border: 1px solid rgba(155,118,251,0.25);
      color: var(--neon-purple);
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 0 12px rgba(155,118,251,0.08);
    }
    .btn-mic:active {
      transform: scale(0.92);
    }
    .btn-mic.recording {
      background: var(--purple-dim);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 0 0 rgba(155,118,251,0.5);
      animation: mic-ring 1.2s ease-in-out infinite;
    }
    @keyframes mic-ring {
      0%  { box-shadow: 0 0 0 0   rgba(155,118,251,0.5); }
      70% { box-shadow: 0 0 0 14px rgba(155,118,251,0);  }
      100%{ box-shadow: 0 0 0 0   rgba(155,118,251,0);   }
    }

    .input-pill {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      transition: border-color 0.2s;
      min-height: 48px;
    }
    .input-pill:focus-within {
      border-color: rgba(155,118,251,0.35);
    }

    textarea.field {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      max-height: 96px;
      caret-color: var(--purple);
    }
    textarea.field::placeholder { color: var(--text-dim); }

    .btn-send {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--purple);
      border: none;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
      align-self: flex-end;
    }
    .btn-send:disabled { opacity: 0.15; }
    .btn-send:not(:disabled):active { transform: scale(0.88); }

    /* ═══════════════════════════════
       VOICE OVERLAY — Cyberpunk
    ═══════════════════════════════ */
    .voice-screen {
      position: fixed; inset: 0;
      background: rgba(4,3,10,0.97);
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      gap: 32px;
      padding: 40px;
    }
    .voice-screen.open { display: flex; }

    .voice-label {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .voice-circle-wrap {
      position: relative;
      width: 130px; height: 130px;
      display: flex; align-items: center; justify-content: center;
    }
    .voice-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(155,118,251,0.2);
      animation: vring 2s ease-out infinite;
    }
    .voice-ring:nth-child(1){ width:130px;height:130px;animation-delay:0s; }
    .voice-ring:nth-child(2){ width:170px;height:170px;animation-delay:0.5s; }
    .voice-ring:nth-child(3){ width:215px;height:215px;animation-delay:1s; }
    @keyframes vring {
      0%  { opacity:.7; transform:scale(.85); }
      100%{ opacity:0;  transform:scale(1.1); }
    }

    .voice-circle {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(155,118,251,0.15), rgba(103,232,249,0.08));
      border: 1.5px solid rgba(155,118,251,0.45);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      position: relative; z-index: 1;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      cursor: pointer;
      box-shadow: 0 0 40px rgba(155,118,251,0.15);
    }

    .voice-transcript {
      font-size: 18px;
      color: var(--text);
      text-align: center;
      max-width: 280px;
      min-height: 52px;
      line-height: 1.55;
    }

    .btn-voice-cancel {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 15px;
      padding: 14px 36px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-voice-cancel:active {
      background: var(--surface2);
    }

    /* ═══════════════════════════════
       CONFIRMATION SHEET
    ═══════════════════════════════ */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: none; align-items: flex-end;
    }
    .sheet-overlay.open { display: flex; }

    .sheet {
      width: 100%;
      background: #12111f;
      border-top-left-radius: 26px;
      border-top-right-radius: 26px;
      border-top: 1px solid rgba(155,118,251,0.25);
      padding: 20px 22px calc(22px + var(--safe-bottom));
      animation: sheet-rise 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes sheet-rise {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .sheet-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.13);
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .sheet-tag {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .sheet-body {
      font-size: 15px;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 20px;
    }
    .sheet-actions {
      display: flex; gap: 10px;
    }
    .btn-cancel-sheet {
      flex: 1;
      padding: 14px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text-dim);
      font-size: 15px;
      cursor: pointer;
    }
    .btn-ok-sheet {
      flex: 2;
      padding: 14px 0;
      background: var(--purple);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-ok-sheet:active { opacity: 0.8; }

  </style>
</head>
<body>
<div class="app">

  <!-- ── HEADER ── -->
  <header>
    <span class="logo">Diabolus</span>
    <div class="header-actions">
      <div class="status-pill">
        <div class="dot-alive"></div>
        <span id="statusLabel">Listo</span>
      </div>
      <button class="btn-header btn-dashboard" onclick="goDesktop()" title="Ver App">📊 App</button>
      <button class="btn-header" id="btnSound" onclick="toggleSound()" title="Silenciar voz">🔊</button>
    </div>
  </header>

  <!-- ── MESSAGES ── -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">

      <!-- Neon greeting -->
      <div class="neon-greeting">Hola, Jefe</div>
      <div class="neon-sub">Tu Diablilla está lista. ¿Qué necesitas?</div>

      <!-- Big voice button -->
      <div class="voice-hero" onclick="toggleVoice()">
        <div class="voice-hero-ring"></div>
        <div class="voice-hero-ring"></div>
        <div class="voice-hero-btn">🎙</div>
      </div>
      <div class="voice-hero-label">Pulsa para hablar</div>

      <!-- Quick action grid — big buttons -->
      <div class="quick-grid">
        <div class="quick-btn" onclick="useHint('Cobré 45€ de manicura a María')">
          <span class="q-icon">💰</span>
          <span>Registrar cobro</span>
        </div>
        <div class="quick-btn" onclick="useHint('Gasté 80€ en tinte Wella')">
          <span class="q-icon">💸</span>
          <span>Apuntar gasto</span>
        </div>
        <div class="quick-btn" onclick="useHint('¿Cuánto he cobrado hoy?')">
          <span class="q-icon">📊</span>
          <span>¿Cuánto llevo?</span>
        </div>
        <div class="quick-btn" onclick="useHint('¿Quién me debe dinero?')">
          <span class="q-icon">⏳</span>
          <span>Quién me debe</span>
        </div>
        <div class="quick-btn" onclick="useHint('Crea factura para Ana por 120€ de coloración')">
          <span class="q-icon">🧾</span>
          <span>Crear factura</span>
        </div>
        <div class="quick-btn" onclick="useHint('Nuevo cliente Laura Pérez teléfono 612345678')">
          <span class="q-icon">👥</span>
          <span>Nuevo cliente</span>
        </div>
      </div>

      <!-- Dashboard link -->
      <a href="dashboard.html" class="dashboard-link" onclick="sessionStorage.setItem('forceDesktop','1')">
        📊 Ver Dashboard
      </a>

    </div>
  </div>

  <!-- ── INPUT BAR ── -->
  <div class="input-bar">
    <button class="btn-mic" id="btnMic" onclick="toggleVoice()" title="Hablar">🎙</button>
    <div class="input-pill">
      <textarea class="field" id="field" placeholder="Escribe o habla…" rows="1"
        oninput="onInput(this)" onkeydown="onKey(event)"></textarea>
      <button class="btn-send" id="btnSend" onclick="submit()" disabled>↑</button>
    </div>
  </div>

</div>

<!-- ── VOICE SCREEN ── -->
<div class="voice-screen" id="voiceScreen">
  <div class="voice-label" id="voiceLabel">Escuchando…</div>
  <div class="voice-circle-wrap">
    <div class="voice-ring"></div>
    <div class="voice-ring"></div>
    <div class="voice-ring"></div>
    <div class="voice-circle" onclick="stopVoice()" title="Parar">◉</div>
  </div>
  <div class="voice-transcript" id="voiceTranscript">Di tu orden…</div>
  <button class="btn-voice-cancel" onclick="stopVoice()">Cancelar</button>
</div>

<!-- ── CONFIRMATION SHEET ── -->
<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-tag">⚡ Confirmar acción</div>
    <div class="sheet-body" id="sheetBody"></div>
    <div class="sheet-actions">
      <button class="btn-cancel-sheet" onclick="cancelSheet()">Cancelar</button>
      <button class="btn-ok-sheet" onclick="confirmSheet()">Confirmar ✓</button>
    </div>
  </div>
</div>

<script>

// @ts-nocheck
'use strict';

const API = 'https://diabolus-crm-api.vercel.app';

/* ── AUTH ── */
function getAuth() {
  try {
    const d = JSON.parse(localStorage.getItem('diabolus_auth') || 'null');
    if (!d) return null;
    return { ...d, salon_id: d.salon_id || d.salonId };
  } catch { return null; }
}
const auth = getAuth();
if (!auth?.token) { window.location.replace('index-login.html'); }

/* ── DESKTOP TOGGLE ── */
function goDesktop() {
  sessionStorage.setItem('forceDesktop', '1');
  window.location.href = 'dashboard.html';
}

/* ── TEXTAREA ── */
function onInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
  document.getElementById('btnSend').disabled = el.value.trim() === '';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const v = document.getElementById('field').value.trim();
    if (v) submit();
  }
}

function useHint(text) {
  const f = document.getElementById('field');
  f.value = text;
  onInput(f);
  submit();
}

/* ── MESSAGES ── */
let welcomeGone = false;
function hideWelcome() {
  if (welcomeGone) return;
  document.getElementById('welcome')?.remove();
  welcomeGone = true;
}

function addMsg(role, html, opts = {}) {
  hideWelcome();
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  const tagHtml = (role === 'ai' && opts.diablo_emoji && opts.diablo_label)
    ? `<div class="diablo-tag"><span class="diablo-emoji">${opts.diablo_emoji}</span> vía ${opts.diablo_label}</div>`
    : '';
  el.innerHTML = `${tagHtml}<div class="bubble">${html}</div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
  return el;
}

function addTyping() {
  hideWelcome();
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.id = 'typing';
  el.className = 'msg ai typing';
  el.innerHTML = `<div class="bubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

/* ── SEND ── */
let pendingAction = null;

async function submit(userText) {
  primeAudioContext(); // SYNC: desbloquear AudioContext antes del primer await (clave para iOS)
  const field = document.getElementById('field');
  const msg = userText || field.value.trim();
  if (!msg) return;
  field.value = '';
  onInput(field);

  addMsg('user', escHtml(msg));
  addTyping();
  setStatus('Procesando…');

  try {
    const res = await fetch(`${API}/api/agent/chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${auth.token}`
      },
      body: JSON.stringify({ userInput: msg, salon_id: auth.salon_id })
    });

    let data;
    try { data = await res.json(); } catch(e) { data = {}; }

    removeTyping();

    if (!res.ok) {
      setStatus('Error ' + res.status);
      if (res.status === 401 || res.status === 403) {
        addMsg('ai', '🔐 Sesión expirada. <a href="index-login.html" style="color:var(--purple)">Inicia sesión de nuevo</a>.');
      } else {
        addMsg('ai', `❌ Error ${res.status}: ${data.error || data.message || 'Sin respuesta del servidor'}`);
      }
      return;
    }

    setStatus('Listo');

    if (data.status === 'pending_confirmation' && data.card) {
      pendingAction = data;
      const card = data.card;
      const summary = card.summary || card.message || card.description || JSON.stringify(card);
      document.getElementById('sheetBody').textContent = summary;
      document.getElementById('sheetOverlay').classList.add('open');
      addMsg('ai', '⚡ Revisa la acción a confirmar.');
    } else {
      const reply = data.message || data.reply || '✓ Hecho.';
      addMsg('ai', escHtml(reply).replace(/\n/g,'<br>'), {diablo_emoji: data.diablo_emoji||'', diablo_label: data.diablo_label||''});
      speakResponse(reply);  // TTS en respuestas normales
    }
  } catch (err) {
    removeTyping();
    setStatus('Sin conexión');
    const errMsg = (err && err.message) ? err.message : String(err);
    addMsg('ai', `❌ Fallo de red: ${errMsg.includes('fetch') ? 'CORS o sin conexión' : errMsg}`);
  }
}

/* ── CONFIRM SHEET ── */
async function confirmSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  if (!pendingAction) return;
  addTyping();
  setStatus('Ejecutando…');
  try {
    const pendingId = pendingAction.card?.action_id || pendingAction.card?.pending_action_id || pendingAction.action_id;
    const res = await fetch(`${API}/api/agent/confirm`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${auth.token}`
      },
      body: JSON.stringify({ pending_action_id: pendingId })
    });
    const data = await res.json();
    removeTyping();
    setStatus('Listo');
    const confirmReply = data.message || data.reply || '✅ ¡Hecho! Registrado en tu contabilidad.';
    addMsg('ai', escHtml(confirmReply).replace(/\n/g,'<br>'));
    speakResponse(confirmReply);
  } catch {
    removeTyping();
    addMsg('ai', '❌ Error al confirmar. Inténtalo de nuevo.');
  }
  pendingAction = null;
}

function cancelSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  if (pendingAction) {
    const pendingId = pendingAction.card?.action_id || pendingAction.card?.pending_action_id || pendingAction.action_id;
    fetch(`${API}/api/agent/cancel`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${auth.token}` },
      body: JSON.stringify({ pending_action_id: pendingId })
    }).catch(() => {});
  }
  addMsg('ai', 'Cancelado. Dime si quieres hacer algo más.');
  pendingAction = null;
}

/* ── VOICE ── */
let recog = null;
let isRec = false;
let mediaRec = null;

function toggleVoice() {
  if (isRec) { stopVoice(); return; }
  startVoice();
}

async function startVoice() {
  // Step 1 — pedir permiso de micrófono explícitamente (iOS requiere esto)
  try {
    const testStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    testStream.getTracks().forEach(t => t.stop());
  } catch(err) {
    addMsg('ai', '🎙 Necesito acceso al micrófono.\n\nVe a: Ajustes → Safari → Micrófono → Permitir para diabolus.es');
    return;
  }

  isRec = true;
  openVoiceUI('Habla ahora', 'Escuchando…');

  // Step 2 — intentar API nativa (Chrome / Safari iOS 17+)
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    recog = new SR();
    recog.lang = 'es-ES';
    recog.continuous = false;
    recog.interimResults = true;
    recog.maxAlternatives = 1;

    recog.onresult = (e) => {
      const t = Array.from(e.results).map(r => r[0].transcript).join('');
      document.getElementById('voiceTranscript').textContent = t;
    };

    recog.onend = () => {
      const t = document.getElementById('voiceTranscript').textContent.trim();
      stopVoice();
      const bad = ['escuchando…','di tu orden…','habla ahora'];
      if (t && !bad.includes(t.toLowerCase())) submit(t);
    };

    recog.onerror = (ev) => {
      console.warn('SR error:', ev.error);
      // Cualquier error de SR → caer al MediaRecorder (más fiable en iOS)
      if (recog) { try { recog.abort(); } catch(e){} recog = null; }
      startMediaRecorderFallback();
    };

    try {
      recog.start();
      return;
    } catch(e) {
      recog = null;
      // Caemos al fallback
    }
  }

  // Step 3 — Fallback: MediaRecorder → Groq Whisper (funciona en TODO iOS)
  startMediaRecorderFallback();
}

async function startMediaRecorderFallback() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    isRec = false;
    closeVoiceUI();
    addMsg('ai', '🎙 No se pudo acceder al micrófono.');
    return;
  }

  openVoiceUI('Habla y pulsa ◉ para enviar', 'Grabando…');

  // iOS usa audio/mp4; Android/Chrome usa audio/webm
  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
    : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
    : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
    : '';

  const chunks = [];
  mediaRec = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
  mediaRec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRec.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    openVoiceUI('Transcribiendo…', '⏳ Un momento…');

    const blob = new Blob(chunks, { type: mimeType || 'audio/mp4' });
    const form = new FormData();
    form.append('audio', blob, mimeType && mimeType.includes('webm') ? 'voice.webm' : 'voice.mp4');

    try {
      const auth = getAuth();
      const res = await fetch(`${API}/api/agent/transcribe`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${auth.token}` },
        body: form
      });
      const data = await res.json();
      if (data.text && data.text.trim()) {
        document.getElementById('voiceTranscript').textContent = data.text;
        setTimeout(() => { stopVoice(); submit(data.text.trim()); }, 500);
      } else {
        stopVoice();
        addMsg('ai', '🎙 No captamos tu voz. ¿Puedes repetirlo o escribirlo?');
      }
    } catch(e) {
      stopVoice();
      addMsg('ai', '🎙 Error de transcripción. Escribe tu orden y funciona igual de bien 😉');
    }
  };

  mediaRec.start();
}

function openVoiceUI(label, transcript) {
  document.getElementById('btnMic').classList.add('recording');
  document.getElementById('voiceScreen').classList.add('open');
  document.getElementById('voiceLabel').textContent = label;
  document.getElementById('voiceTranscript').textContent = transcript;
}

function closeVoiceUI() {
  document.getElementById('btnMic').classList.remove('recording');
  document.getElementById('voiceScreen').classList.remove('open');
  document.getElementById('voiceTranscript').textContent = 'Di tu orden…';
}

function stopVoice() {
  isRec = false;
  closeVoiceUI();
  if (recog) { try { recog.stop(); } catch(e){} recog = null; }
  if (mediaRec && mediaRec.state !== 'inactive') { try { mediaRec.stop(); } catch(e){} mediaRec = null; }
}

/* ── TTS — Diabolus habla (ElevenLabs + AudioContext iOS fix) ── */
let ttsEnabled = true;
let ttsCurrentSource = null;

// AudioContext compartido — se desbloquea en el primer gesto del usuario
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return _audioCtx;
}

// Llamar SINCRÓNICAMENTE en el primer gesto (antes de cualquier await)
// Reproduce un buffer silencioso → desbloquea el AudioContext permanentemente en iOS
function primeAudioContext() {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch(e) {}
}

/* ── SONIDO DE APERTURA — sintetizado con Web Audio API ────────────────────
   Demónico y sutil: bass sweep + mid whoosh + chispa alta.
   Android/Desktop: se lanza al cargar la página (100ms delay).
   iOS: se lanza en el primer toque del usuario (autoplay bloqueado por WebKit).
   Solo suena UNA vez por sesión. Respeta el botón 🔇.
────────────────────────────────────────────────────────────────────────── */
let _openingSoundPlayed = false;

function playOpeningSound() {
  if (_openingSoundPlayed) return;
  if (!ttsEnabled) return;
  _openingSoundPlayed = true;
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;

    // 1. Bass rumble demónico (80Hz → 35Hz, 2s)
    const bassOsc = ctx.createOscillator();
    const bassGain = ctx.createGain();
    bassOsc.type = 'sine';
    bassOsc.frequency.setValueAtTime(80, now);
    bassOsc.frequency.exponentialRampToValueAtTime(35, now + 1.8);
    bassGain.gain.setValueAtTime(0, now);
    bassGain.gain.linearRampToValueAtTime(0.38, now + 0.12);
    bassGain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
    bassOsc.connect(bassGain);
    bassGain.connect(ctx.destination);
    bassOsc.start(now);
    bassOsc.stop(now + 2.0);

    // 2. Mid whoosh (sawtooth filtrado, 420Hz → 140Hz, 0.9s)
    const midOsc = ctx.createOscillator();
    const midFilter = ctx.createBiquadFilter();
    const midGain = ctx.createGain();
    midOsc.type = 'sawtooth';
    midOsc.frequency.setValueAtTime(420, now);
    midOsc.frequency.exponentialRampToValueAtTime(140, now + 0.85);
    midFilter.type = 'bandpass';
    midFilter.frequency.value = 280;
    midFilter.Q.value = 2.5;
    midGain.gain.setValueAtTime(0, now);
    midGain.gain.linearRampToValueAtTime(0.12, now + 0.06);
    midGain.gain.exponentialRampToValueAtTime(0.001, now + 0.85);
    midOsc.connect(midFilter);
    midFilter.connect(midGain);
    midGain.connect(ctx.destination);
    midOsc.start(now);
    midOsc.stop(now + 0.85);

    // 3. Chispa alta (sine, 1400Hz → 700Hz, comienza a 0.08s)
    const hiOsc = ctx.createOscillator();
    const hiGain = ctx.createGain();
    hiOsc.type = 'sine';
    hiOsc.frequency.setValueAtTime(1400, now + 0.08);
    hiOsc.frequency.exponentialRampToValueAtTime(700, now + 0.45);
    hiGain.gain.setValueAtTime(0, now + 0.08);
    hiGain.gain.linearRampToValueAtTime(0.09, now + 0.13);
    hiGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    hiOsc.connect(hiGain);
    hiGain.connect(ctx.destination);
    hiOsc.start(now + 0.08);
    hiOsc.stop(now + 0.5);

  } catch(e) {}
}

// Desktop / Android → autoplay permitido
setTimeout(() => { playOpeningSound(); }, 100);

// iOS → esperar primer toque (autoplay bloqueado por WebKit)
document.addEventListener('touchstart', function _iosSound() {
  document.removeEventListener('touchstart', _iosSound);
  playOpeningSound();
}, { once: true, passive: true });

function toggleSound() {
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById('btnSound');
  btn.textContent = ttsEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !ttsEnabled);
  if (!ttsEnabled) stopCurrentAudio();
  primeAudioContext();
}

function stopCurrentAudio() {
  if (ttsCurrentSource) {
    try { ttsCurrentSource.stop(); } catch(e) {}
    ttsCurrentSource = null;
  }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

async function speakResponse(text) {
  if (!ttsEnabled || !text) return;
  stopCurrentAudio();

  const clean = text
    .replace(/[*_~`#>]/g, '')
    .replace(/\p{Emoji}/gu, '')
    .replace(/\[(.*?)\]\(.*?\)/g, '$1')
    .replace(/\n+/g, '. ')
    .trim()
    .slice(0, 600);

  if (!clean) return;

  try {
    const a = getAuth();
    const res = await fetch(`${API}/api/agent/tts`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${a.token}`
      },
      body: JSON.stringify({ text: clean })
    });

    if (!res.ok) throw new Error('TTS ' + res.status);

    const arrayBuf = await res.arrayBuffer();
    if (!arrayBuf || arrayBuf.byteLength < 100) throw new Error('Audio vacío');

    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') {
      try { await ctx.resume(); } catch(e) {}
    }

    const audioBuffer = await ctx.decodeAudioData(arrayBuf.slice(0));
    const source = ctx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(ctx.destination);
    ttsCurrentSource = source;
    source.onended = () => { ttsCurrentSource = null; };
    source.start(0);

  } catch(e) {
    // Fallback: speechSynthesis nativo
    try {
      if (window.speechSynthesis) {
        const u = new SpeechSynthesisUtterance(clean.slice(0, 300));
        u.lang = 'es-ES';
        u.rate = 1.05;
        const voices = window.speechSynthesis.getVoices();
        const esVoice = voices.find(v => v.lang.startsWith('es') && v.localService)
                     || voices.find(v => v.lang.startsWith('es'));
        if (esVoice) u.voice = esVoice;
        window.speechSynthesis.speak(u);
      }
    } catch(e2) {}
  }
}

/* ── HELPERS ── */
function setStatus(text) {
  document.getElementById('statusLabel').textContent = text;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* prevent scroll on voice overlay */
document.getElementById('voiceScreen').addEventListener('touchmove', e => e.preventDefault(), { passive: false });

</script>
</body>
</html>

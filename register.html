<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="description" content="Diabolus CRM — Beta privada.">
  <title>Diabolus CRM — Registro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diabolus">
  <link rel="stylesheet" href="diabolus-tokens.css">
  <style>
    .reg-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      padding: 2rem;
    }
    .reg-box {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.08);
    }
    .reg-logo { text-align: center; margin-bottom: 1rem; }
    .reg-tagline {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.8rem;
      margin-bottom: 2rem;
    }
    /* Beta closed state */
    .beta-closed {
      text-align: center;
    }
    .beta-icon { font-size: 3rem; margin-bottom: 1rem; }
    .beta-title {
      font-size: 1.2rem;
      font-family: var(--font-display);
      letter-spacing: 0.05em;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    .beta-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    /* Form state */
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input { width: 100%; box-sizing: border-box; }
    .reg-btn {
      width: 100%;
      padding: 0.875rem;
      font-size: 0.95rem;
      font-family: var(--font-display);
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
    }
    .alert-box {
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.825rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .alert-error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.35);
      color: #86efac;
    }
    .invite-badge {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 0.5rem;
      padding: 0.6rem 1rem;
      font-size: 0.78rem;
      color: #c4b5fd;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }
    .login-link a { color: var(--violet); text-decoration: none; font-weight: 600; }
    .login-link a:hover { text-decoration: underline; }
    #validating {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.85rem;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="reg-wrap">
    <div class="reg-box">
      <div class="reg-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" style="width:100%;max-width:240px;display:block;margin:0 auto;" aria-label="Diabolus">
          <defs>
            <filter id="gf-s" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="12" result="b1"/>
              <feGaussianBlur stdDeviation="5"  result="b2"/>
              <feGaussianBlur stdDeviation="2"  result="b3"/>
              <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="b3"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="sd" x="-10%" y="-10%" width="120%" height="140%">
              <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".85"/>
            </filter>
            <linearGradient id="gv" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#E0D0FF"/>
              <stop offset="40%"  stop-color="#C4B5FD"/>
              <stop offset="100%" stop-color="#7C3AED"/>
            </linearGradient>
          </defs>
          <text x="350" y="160" font-family="Georgia,'Times New Roman',serif" font-size="140" font-weight="900" font-style="italic" text-anchor="middle" fill="none" stroke="#1a0033" stroke-width="18" filter="url(#sd)" transform="skewX(-18)">Diabolus</text>
          <text x="350" y="160" font-family="Georgia,'Times New Roman',serif" font-size="140" font-weight="900" font-style="italic" text-anchor="middle" fill="none" stroke="#8B5CF6" stroke-width="3" filter="url(#gf-s)" transform="skewX(-18)" opacity=".9">Diabolus</text>
          <text x="350" y="160" font-family="Georgia,'Times New Roman',serif" font-size="140" font-weight="900" font-style="italic" text-anchor="middle" fill="url(#gv)" stroke="#C4B5FD" stroke-width=".4" transform="skewX(-18)">Diabolus</text>
        </svg>
      </div>
      <p class="reg-tagline">Tesorería que se gestiona hablando.</p>

      <!-- Estado: validando token -->
      <div id="validating">Verificando invitación…</div>

      <!-- Estado: beta cerrada (sin token) -->
      <div id="betaClosed" class="beta-closed" style="display:none;">
        <div class="beta-icon">🔒</div>
        <div class="beta-title">Beta privada</div>
        <p class="beta-desc">
          Diabolus está actualmente en beta privada.<br>
          El acceso es solo por invitación.<br><br>
          Si crees que deberías tener acceso, contacta con el equipo.
        </p>
        <a href="index-login.html" class="btn btn-secondary" style="width:100%;display:block;text-align:center;">
          Ir al login
        </a>
      </div>

      <!-- Estado: formulario de registro (con token válido) -->
      <div id="registerForm" style="display:none;">
        <div class="invite-badge" id="inviteBadge">
          ✅ Invitación válida
        </div>

        <div class="alert-box alert-error" id="alertError"></div>
        <div class="alert-box alert-success" id="alertSuccess"></div>

        <form id="regForm">
          <div class="form-group">
            <label for="businessName">Nombre de tu negocio</label>
            <input type="text" id="businessName" placeholder="Peluquería García, Clínica Martínez..." required autocomplete="organization">
          </div>
          <div class="form-group">
            <label for="email">Email de acceso</label>
            <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="passwordConfirm">Repite la contraseña</label>
            <input type="password" id="passwordConfirm" placeholder="••••••••" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary reg-btn" id="submitBtn">
            CREAR MI CUENTA
          </button>
        </form>

        <div class="login-link">
          ¿Ya tienes cuenta? <a href="index-login.html">Inicia sesión</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://diabolus-crm-api.vercel.app'
    const params = new URLSearchParams(window.location.search)
    const inviteToken = params.get('invite')

    async function init() {
      const validating = document.getElementById('validating')
      const betaClosed = document.getElementById('betaClosed')
      const registerForm = document.getElementById('registerForm')
      const inviteBadge = document.getElementById('inviteBadge')

      if (!inviteToken) {
        validating.style.display = 'none'
        betaClosed.style.display = 'block'
        return
      }

      try {
        const res = await fetch(`${API}/auth/invites/validate?token=${encodeURIComponent(inviteToken)}`)
        const data = await res.json()

        validating.style.display = 'none'

        if (!data.valid) {
          betaClosed.style.display = 'block'
          betaClosed.querySelector('.beta-icon').textContent = '⚠️'
          betaClosed.querySelector('.beta-title').textContent = 'Invitación no válida'
          betaClosed.querySelector('.beta-desc').textContent = data.error || 'Esta invitación no es válida o ha caducado.'
          return
        }

        if (data.email_hint) {
          inviteBadge.textContent = `✅ Invitación válida para ${data.email_hint}`
          document.getElementById('email').value = data.email_hint
        }
        registerForm.style.display = 'block'

      } catch {
        validating.style.display = 'none'
        betaClosed.style.display = 'block'
      }
    }

    function isMobile() {
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 768
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const businessName = document.getElementById('businessName').value.trim()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const passwordConfirm = document.getElementById('passwordConfirm').value
      const btn = document.getElementById('submitBtn')
      const alertError = document.getElementById('alertError')
      const alertSuccess = document.getElementById('alertSuccess')

      alertError.style.display = 'none'
      alertSuccess.style.display = 'none'

      if (password !== passwordConfirm) {
        alertError.textContent = 'Las contraseñas no coinciden.'
        alertError.style.display = 'block'
        return
      }

      btn.disabled = true
      btn.textContent = 'Creando cuenta…'

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ businessName, email, password, beta_invite_token: inviteToken }),
        })
        const data = await res.json()

        if (!res.ok) {
          alertError.textContent = data.error || 'Error al crear la cuenta.'
          alertError.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'CREAR MI CUENTA'
          return
        }

        localStorage.setItem('diabolus_auth', JSON.stringify({
          userId: data.user.id,
          email: data.user.email,
          salonId: data.salon?.id ?? null,
          salonName: data.salon?.name ?? businessName,
          token: data.token,
        }))
        localStorage.setItem('diabolus_token', data.token)

        alertSuccess.textContent = '¡Cuenta creada! Configurando tu negocio…'
        alertSuccess.style.display = 'block'

        setTimeout(() => {
          window.location.href = 'onboarding.html'
        }, 1200)

      } catch {
        alertError.textContent = 'Error de conexión. Verifica tu internet.'
        alertError.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'CREAR MI CUENTA'
      }
    })

    init()

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {})
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8b1538">
  <meta name="description" content="Crea tu cuenta en Diabolus CRM — Centro de mando para tu negocio.">
  <title>Diabolus CRM — Registro</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diabolus">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    :root {
      --primary: #8b1538;
      --primary-hover: #a01a42;
      --gold: #f4c430;
      --bg-main: #0A0E27;
      --bg-secondary: #12162e;
      --bg-tertiary: #1a1f3a;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --border-color: #2d3748;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0A0E27 0%, #1A1F3A 100%);
      padding: 2rem;
    }

    .box {
      background: var(--bg-secondary);
      border: 2px solid var(--primary);
      border-radius: 1rem;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(139, 21, 56, 0.3);
    }

    .logo { text-align: center; font-size: 3rem; margin-bottom: 1rem; }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--primary); }

    .btn {
      width: 100%;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: #86efac;
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-tertiary);
    }

    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover { text-decoration: underline; }

    .plan-badge {
      background: var(--bg-tertiary);
      border-left: 3px solid var(--gold);
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .plan-badge strong { color: var(--gold); }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="stylesheet" href="diabolus-tokens.css">
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="logo">⚡</div>
      <h1>DIABOLUS</h1>
      <p class="subtitle">Tu centro de mando empieza aquí.</p>

      <div class="plan-badge">
        <strong>🎯 Prueba gratuita 14 días</strong><br>
        Sin tarjeta de crédito. Cancela cuando quieras.
      </div>

      <div class="alert alert-error" id="alertError"></div>
      <div class="alert alert-success" id="alertSuccess"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="businessName">Nombre de tu negocio</label>
          <input
            type="text"
            id="businessName"
            placeholder="Peluquería García, Clínica Martínez..."
            required
            autocomplete="organization"
          >
        </div>

        <div class="form-group">
          <label for="email">Email de acceso</label>
          <input
            type="email"
            id="email"
            placeholder="tu@email.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="Mínimo 6 caracteres"
            required
            minlength="6"
            autocomplete="new-password"
          >
        </div>

        <div class="form-group">
          <label for="passwordConfirm">Repite la contraseña</label>
          <input
            type="password"
            id="passwordConfirm"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          >
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          CREAR MI CUENTA
        </button>
      </form>

      <div class="footer-link">
        ¿Ya tienes cuenta? <a href="index-login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://diabolus-crm-api.vercel.app'

    function showError(msg) {
      const el = document.getElementById('alertError')
      el.textContent = msg
      el.style.display = 'block'
      document.getElementById('alertSuccess').style.display = 'none'
    }

    function showSuccess(msg) {
      const el = document.getElementById('alertSuccess')
      el.textContent = msg
      el.style.display = 'block'
      document.getElementById('alertError').style.display = 'none'
    }

    function setLoading(loading) {
      const btn = document.getElementById('submitBtn')
      if (loading) {
        btn.disabled = true
        btn.innerHTML = '<span class="spinner"></span>Creando cuenta...'
      } else {
        btn.disabled = false
        btn.innerHTML = 'CREAR MI CUENTA'
      }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault()

      const businessName = document.getElementById('businessName').value.trim()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const passwordConfirm = document.getElementById('passwordConfirm').value

      if (password !== passwordConfirm) {
        showError('Las contraseñas no coinciden.')
        return
      }

      setLoading(true)

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            businessName,
            email,
            password,
            gestor_invite_token: new URLSearchParams(window.location.search).get('gestor_token') || undefined,
          }),
        })

        const data = await res.json()

        if (!res.ok) {
          showError(data.error || 'Error al crear la cuenta. Inténtalo de nuevo.')
          setLoading(false)
          return
        }

        // Guardar sesión
        localStorage.setItem('diabolus_auth', JSON.stringify({
          userId: data.user.id,
          email: data.user.email,
          salonId: data.salon?.id ?? null,
          salonName: data.salon?.name ?? businessName,
          token: data.token,
        }))
        // Token también como clave independiente (usado por onboarding y chat)
        localStorage.setItem('diabolus_token', data.token)

        showSuccess('¡Cuenta creada! Configurando tu negocio...')

        setTimeout(() => {
          window.location.href = 'onboarding.html'
        }, 1200)

      } catch (err) {
        showError('Error de conexión. Verifica tu internet e inténtalo de nuevo.')
        setLoading(false)
      }
    })
  </script>
  <script>
    // PWA — registro del Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('[SW] registrado:', reg.scope);
        }).catch(err => {
          console.warn('[SW] error al registrar:', err);
        });
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="description" content="CRM inteligente con Agent IA para negocios. Diabolus.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diabolus">
  <link rel="manifest" href="manifest.json">
  <title>Diabolus CRM — Entrar</title>

  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      padding: 2rem;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.08);
    }

    .login-mark {
      text-align: center;
      font-size: 1.375rem;
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--violet);
      letter-spacing: 0.12em;
      margin-bottom: 0.4rem;
    }

    .login-tagline {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.8rem;
      margin-bottom: 2.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      box-sizing: border-box;
    }

    .login-btn {
      width: 100%;
      padding: 0.875rem;
      font-size: 0.95rem;
      font-family: var(--font-display);
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.825rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }

    .register-link a {
      color: var(--violet);
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover { text-decoration: underline; }

    .divider {
      text-align: center;
      margin: 1.25rem 0;
      color: var(--text-tertiary);
      font-size: 0.75rem;
      font-family: var(--font-mono);
    }
  </style>
  <link rel="stylesheet" href="diabolus-tokens.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-mark">🧿 DIABOLUS</div>
      <p class="login-tagline">Tesorería que se gestiona hablando.</p>

      <div class="alert-error" id="alertError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
          ENTRAR
        </button>
      </form>

      <div class="divider">— o —</div>

      <button class="btn btn-secondary" style="width:100%;" onclick="loginAsDemo()">
        Acceso Demo
      </button>

      <div class="register-link">
        ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://diabolus-crm-api.vercel.app'

    function loginAsDemo() {
      localStorage.setItem('diabolus_auth', JSON.stringify({
        userId:    'user_demo',
        email:     'demo@diaboluscrm.com',
        salonId:   'salon_demo',
        salonName: 'Demo Negocio',
        token:     'demo_token_xyz'
      }))
      window.location.href = 'dashboard.html'
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('loginBtn')
      const alertEl  = document.getElementById('alertError')

      btn.disabled    = true
      btn.textContent = 'Entrando…'
      alertEl.style.display = 'none'

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        })
        const data = await res.json()

        if (!res.ok) {
          alertEl.textContent    = data.error || 'Credenciales incorrectas'
          alertEl.style.display  = 'block'
          btn.disabled    = false
          btn.textContent = 'ENTRAR'
          return
        }

        localStorage.setItem('diabolus_auth', JSON.stringify({
          userId:    data.user.id,
          email:     data.user.email,
          salonId:   data.salon?.id   ?? null,
          salonName: data.salon?.name ?? 'Mi negocio',
          token:     data.token,
        }))

        window.location.href = 'dashboard.html'

      } catch (err) {
        alertEl.textContent   = 'Error de conexión. Comprueba tu internet.'
        alertEl.style.display = 'block'
        btn.disabled    = false
        btn.textContent = 'ENTRAR'
      }
    })

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .catch(e => console.warn('[SW] error:', e))
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="description" content="CRM inteligente con Agent IA para negocios. Diabolus.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diabolus">
  <link rel="manifest" href="manifest.json">
  <title>Diabolus CRM — Entrar</title>

  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      padding: 2rem;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.08);
    }

    .login-mark {
      text-align: center;
      margin-bottom: 1rem;
      padding: 0 1rem;
    }

    .login-tagline {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.8rem;
      margin-bottom: 2.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      box-sizing: border-box;
    }

    .login-btn {
      width: 100%;
      padding: 0.875rem;
      font-size: 0.95rem;
      font-family: var(--font-display);
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.825rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .beta-notice {
      background: rgba(139, 92, 246, 0.07);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 0.5rem;
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 1.5rem;
      line-height: 1.5;
    }
  </style>
  <link rel="stylesheet" href="diabolus-tokens.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-mark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" style="width:100%;max-width:280px;display:block;margin:0 auto;" aria-label="Diabolus">
          <defs>
            <filter id="gf-s" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="12" result="b1"/>
              <feGaussianBlur stdDeviation="5"  result="b2"/>
              <feGaussianBlur stdDeviation="2"  result="b3"/>
              <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="b3"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="gf-g" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="sd" x="-10%" y="-10%" width="120%" height="140%">
              <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".85"/>
            </filter>
            <linearGradient id="gv" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#E0D0FF"/>
              <stop offset="40%"  stop-color="#C4B5FD"/>
              <stop offset="100%" stop-color="#7C3AED"/>
            </linearGradient>
          </defs>
          <text x="350" y="160" font-family="Georgia,'Times New Roman',serif" font-size="140" font-weight="900" font-style="italic" text-anchor="middle" fill="none" stroke="#1a0033" stroke-width="18" filter="url(#sd)" transform="skewX(-18)">Diabolus</text>
          <text x="350" y="160" font-family="Georgia,'Times New Roman',serif" font-size="140" font-weight="900" font-style="italic" text-anchor="middle" fill="none" stroke="#6D28D9" stroke-width="8" filter="url(#gf-s)" transform="skewX(-18)" opacity=".6">Diabolus</text>
          <text x="350" y="160" font-family="Georgia,'Times New Roman',serif" font-size="140" font-weight="900" font-style="italic" text-anchor="middle" fill="none" stroke="#8B5CF6" stroke-width="3" filter="url(#gf-s)" transform="skewX(-18)" opacity=".9">Diabolus</text>
          <text x="350" y="160" font-family="Georgia,'Times New Roman',serif" font-size="140" font-weight="900" font-style="italic" text-anchor="middle" fill="url(#gv)" stroke="#C4B5FD" stroke-width=".4" transform="skewX(-18)">Diabolus</text>
          <line x1="30" y1="178" x2="620" y2="168" stroke="#E3BE7A" stroke-width="1.2" stroke-linecap="round" filter="url(#gf-g)" opacity=".85"/>
        </svg>
      </div>
      <p class="login-tagline">Tesorería que se gestiona hablando.</p>

      <div class="alert-error" id="alertError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
          ENTRAR
        </button>
      </form>

      <div class="beta-notice">
        🔒 Acceso por invitación — Beta privada
      </div>
    </div>
  </div>

  <script>
    const API = 'https://diabolus-crm-api.vercel.app'

    function isMobile() {
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 768
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('loginBtn')
      const alertEl  = document.getElementById('alertError')

      btn.disabled    = true
      btn.textContent = 'Entrando…'
      alertEl.style.display = 'none'

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        })
        const data = await res.json()

        if (!res.ok) {
          alertEl.textContent    = data.error || 'Credenciales incorrectas'
          alertEl.style.display  = 'block'
          btn.disabled    = false
          btn.textContent = 'ENTRAR'
          return
        }

        // Guardamos token Y refresh_token para auto-renovar la sesión
        localStorage.setItem('diabolus_auth', JSON.stringify({
          userId:       data.user.id,
          email:        data.user.email,
          salonId:      data.salon?.id   ?? null,
          salonName:    data.salon?.name ?? 'Mi negocio',
          token:        data.token,
          refreshToken: data.refresh_token ?? null,
        }))

        window.location.href = isMobile() ? 'mobile.html' : 'dashboard.html'

      } catch (err) {
        alertEl.textContent   = 'Error de conexión. Comprueba tu internet.'
        alertEl.style.display = 'block'
        btn.disabled    = false
        btn.textContent = 'ENTRAR'
      }
    })

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(e => console.warn('[SW] error:', e))
    }
  </script>
</body>
</html>

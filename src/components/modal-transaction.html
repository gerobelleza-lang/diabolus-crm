<!-- Modal: Nueva Transacción -->
<div id="transactionModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-gray-800 border border-gray-700 rounded-lg p-8 max-w-md w-full mx-4">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold">Nueva Transacción</h2>
      <button onclick="closeModal('transactionModal')" class="text-gray-400 hover:text-white text-2xl">✕</button>
    </div>

    <form id="transactionForm" class="space-y-4" onsubmit="handleNewTransaction(event)">
      <div>
        <label class="block text-sm font-semibold mb-2">Tipo</label>
        <select id="txType" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:border-orange-500 focus:outline-none">
          <option value="income">Ingreso</option>
          <option value="expense">Gasto</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">Monto (€)</label>
        <input type="number" id="txAmount" placeholder="450.00" step="0.01" min="0" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:border-orange-500 focus:outline-none"/>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">Concepto</label>
        <input type="text" id="txConcept" placeholder="Corte de cabello" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:border-orange-500 focus:outline-none"/>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">Cliente (opcional)</label>
        <input type="text" id="txClient" placeholder="María García" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:border-orange-500 focus:outline-none"/>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">Estado</label>
        <select id="txStatus" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:border-orange-500 focus:outline-none">
          <option value="paid">Pagado</option>
          <option value="pending">Pendiente</option>
        </select>
      </div>

      <div id="txError" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm"></div>

      <div class="flex gap-3 pt-4">
        <button type="submit" class="flex-1 px-4 py-3 bg-orange-500 hover:bg-orange-600 rounded-lg font-semibold transition">Crear</button>
        <button type="button" onclick="closeModal('transactionModal')" class="flex-1 px-4 py-3 border border-gray-700 hover:border-orange-500 rounded-lg font-semibold transition">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<script>
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

async function handleNewTransaction(event) {
  event.preventDefault();
  
  const type = document.getElementById('txType').value;
  const amount = parseFloat(document.getElementById('txAmount').value);
  const concept = document.getElementById('txConcept').value;
  const status = document.getElementById('txStatus').value;
  const errorDiv = document.getElementById('txError');
  
  errorDiv.classList.add('hidden');

  if (amount <= 0) {
    errorDiv.textContent = 'El monto debe ser mayor a 0';
    errorDiv.classList.remove('hidden');
    return;
  }

  try {
    const res = await fetch('/api/agent', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}`,
        'X-Salon-ID': localStorage.getItem('salon_id'),
      },
      body: JSON.stringify({
        message: `Registrar ${type === 'income' ? 'ingreso' : 'gasto'} de €${amount} por ${concept}. Estado: ${status}`
      })
    });

    const data = await res.json();
    
    if (!res.ok) {
      throw new Error(data.error || 'Error creando transacción');
    }

    closeModal('transactionModal');
    document.getElementById('transactionForm').reset();
    
    // Recargar datos
    if (typeof loadDashboard === 'function') loadDashboard();
    if (typeof loadTransactions === 'function') loadTransactions();
  } catch (error) {
    errorDiv.textContent = error.message;
    errorDiv.classList.remove('hidden');
  }
}
</script>

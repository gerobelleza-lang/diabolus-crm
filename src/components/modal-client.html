<!-- Modal: Nuevo Cliente -->
<div id="clientModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-gray-800 border border-gray-700 rounded-lg p-8 max-w-md w-full mx-4">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold">Nuevo Cliente</h2>
      <button onclick="closeModal('clientModal')" class="text-gray-400 hover:text-white text-2xl">✕</button>
    </div>

    <form id="clientForm" class="space-y-4" onsubmit="handleNewClient(event)">
      <div>
        <label class="block text-sm font-semibold mb-2">Nombre *</label>
        <input type="text" id="clientName" placeholder="María García" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:border-orange-500 focus:outline-none"/>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">Teléfono</label>
        <input type="tel" id="clientPhone" placeholder="666 123 456" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:border-orange-500 focus:outline-none"/>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">Email</label>
        <input type="email" id="clientEmail" placeholder="maria@email.com" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:border-orange-500 focus:outline-none"/>
      </div>

      <div id="clientError" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm"></div>

      <div class="flex gap-3 pt-4">
        <button type="submit" class="flex-1 px-4 py-3 bg-orange-500 hover:bg-orange-600 rounded-lg font-semibold transition">Crear</button>
        <button type="button" onclick="closeModal('clientModal')" class="flex-1 px-4 py-3 border border-gray-700 hover:border-orange-500 rounded-lg font-semibold transition">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<script>
async function handleNewClient(event) {
  event.preventDefault();
  
  const name = document.getElementById('clientName').value;
  const phone = document.getElementById('clientPhone').value;
  const email = document.getElementById('clientEmail').value;
  const errorDiv = document.getElementById('clientError');
  
  errorDiv.classList.add('hidden');

  if (!name.trim()) {
    errorDiv.textContent = 'El nombre es requerido';
    errorDiv.classList.remove('hidden');
    return;
  }

  try {
    const res = await fetch('/api/agent', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}`,
        'X-Salon-ID': localStorage.getItem('salon_id'),
      },
      body: JSON.stringify({
        message: `Crear cliente: ${name}${phone ? ', teléfono ' + phone : ''}${email ? ', email ' + email : ''}`
      })
    });

    const data = await res.json();
    
    if (!res.ok) {
      throw new Error(data.error || 'Error creando cliente');
    }

    closeModal('clientModal');
    document.getElementById('clientForm').reset();
    
    if (typeof loadClients === 'function') loadClients();
  } catch (error) {
    errorDiv.textContent = error.message;
    errorDiv.classList.remove('hidden');
  }
}
</script>

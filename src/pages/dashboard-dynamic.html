<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Diabolus CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white">
  <script>if(!localStorage.getItem("token"))window.location.href="/login";</script>
  
  <div class="fixed left-0 top-0 w-64 h-screen bg-black border-r border-gray-800 flex flex-col z-40">
    <div class="p-6 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center font-bold">⚡</div>
        <span class="font-bold text-xl">DIABOLUS</span>
      </div>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <a href="/dashboard" class="block px-4 py-3 bg-orange-500/20 border-l-2 border-orange-500 text-orange-400">📊 Dashboard</a>
      <a href="/transactions" class="block px-4 py-3 text-gray-400">💰 Transacciones</a>
      <a href="/clients" class="block px-4 py-3 text-gray-400">👥 Clientes</a>
      <a href="/reports" class="block px-4 py-3 text-gray-400">📈 Reportes</a>
      <a href="/chat-premium" class="block px-4 py-3 text-gray-400">💬 Chat IA</a>
    </nav>
    <div class="p-4 border-t border-gray-800">
      <button onclick="location.href='/logout'" class="w-full px-4 py-3 bg-gray-800 rounded text-sm">🚪 Logout</button>
    </div>
  </div>

  <main class="ml-64 min-h-screen">
    <header class="bg-black/50 border-b border-gray-800 sticky top-0 z-30">
      <div class="px-8 py-4 flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold">Dashboard</h1>
          <p class="text-sm text-gray-400 mt-1">Hoy es <span id="fecha" class="text-orange-400 font-semibold">hoy</span></p>
        </div>
        <div class="flex gap-4">
          <button onclick="openModal('transactionModal')" class="px-6 py-2 bg-orange-500 rounded-lg font-semibold">➕ Nueva transacción</button>
          <button class="px-6 py-2 border border-gray-700 rounded-lg">⚙️ Config</button>
        </div>
      </div>
    </header>

    <div class="p-8">
      <div class="grid grid-cols-4 gap-6 mb-8">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6">
          <p class="text-gray-400 text-sm">Hoy</p>
          <h2 class="text-4xl font-bold mt-2 text-orange-400">€<span id="today">0.00</span></h2>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6">
          <p class="text-gray-400 text-sm">Esta semana</p>
          <h2 class="text-4xl font-bold mt-2 text-blue-400">€<span id="week">0.00</span></h2>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6">
          <p class="text-gray-400 text-sm">Este mes</p>
          <h2 class="text-4xl font-bold mt-2 text-green-400">€<span id="month">0.00</span></h2>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6">
          <p class="text-gray-400 text-sm">Balance</p>
          <h2 class="text-4xl font-bold mt-2 text-purple-400">€<span id="balance">0.00</span></h2>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-8">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6">
          <h3 class="text-lg font-bold mb-4">Ingresos vs Gastos</h3>
          <div style="position:relative;height:250px"><canvas id="chart1"></canvas></div>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6">
          <h3 class="text-lg font-bold mb-4">Servicios</h3>
          <div style="position:relative;height:250px"><canvas id="chart2"></canvas></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const getToken = () => localStorage.getItem('token') || '';
    const getSalonId = () => localStorage.getItem('salon_id') || '';

    document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-ES', {day:'numeric', month:'long'});

    async function loadDashboard() {
      try {
        const res = await fetch('/api/dashboard', {
          headers: {'Authorization': `Bearer ${getToken()}`, 'X-Salon-ID': getSalonId()}
        });
        const data = await res.json();
        document.getElementById('today').textContent = (data.today || 0).toFixed(2);
        document.getElementById('week').textContent = (data.week || 0).toFixed(2);
        document.getElementById('month').textContent = (data.month || 0).toFixed(2);
        document.getElementById('balance').textContent = (data.netBalance || 0).toFixed(2);
        
        // Charts
        const ctx1 = document.getElementById('chart1').getContext('2d');
        new Chart(ctx1, {type:'bar', data: {labels:['L','M','X','J','V','S','D'], datasets:[{label:'Ingresos',data:[250,300,280,320,350,370,280],backgroundColor:'#10b981'},{label:'Gastos',data:[80,120,100,90,110,130,100],backgroundColor:'#ef4444'}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#9ca3af'}}}, scales:{y:{ticks:{color:'#9ca3af'}, grid:{color:'#374151'}}, x:{ticks:{color:'#9ca3af'}}}}});

        const ctx2 = document.getElementById('chart2').getContext('2d');
        new Chart(ctx2, {type:'doughnut', data: {labels:['Corte','Tinte','Manicura','Otro'], datasets:[{data:[35,28,20,17], backgroundColor:['#f97316','#3b82f6','#8b5cf6','#ec4899'], borderColor:'#111827', borderWidth:2}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom', labels:{color:'#9ca3af'}}}}});
      } catch(e) {
        console.error(e);
      }
    }

    loadDashboard();
  </script>
</body>
</html>

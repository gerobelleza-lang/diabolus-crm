<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transacciones — Diabolus CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white">
  <div class="fixed left-0 top-0 w-64 h-screen bg-black border-r border-gray-800 flex flex-col z-40">
    <div class="p-6 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center font-bold">⚡</div>
        <span class="font-bold text-xl">DIABOLUS</span>
      </div>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <a href="/dashboard" class="block px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded transition">📊 Dashboard</a>
      <a href="/transactions" class="block px-4 py-3 bg-orange-500/20 border-l-2 border-orange-500 text-orange-400 rounded transition">💰 Transacciones</a>
      <a href="/clients" class="block px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded transition">👥 Clientes</a>
      <a href="/reports" class="block px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded transition">📈 Reportes</a>
      <a href="/chat-premium" class="block px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded transition">💬 Chat IA</a>
    </nav>
    <div class="p-4 border-t border-gray-800">
      <div class="flex items-center gap-3 px-4 py-3 bg-gray-800 rounded">
        <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center font-bold">M</div>
        <div><p class="text-sm font-semibold">María García</p><p class="text-xs text-gray-400">Peluquería</p></div>
      </div>
    </div>
  </div>

  <main class="ml-64 min-h-screen">
    <header class="bg-black/50 border-b border-gray-800 sticky top-0 z-30">
      <div class="px-8 py-4">
        <div class="flex items-center justify-between mb-4">
          <h1 class="text-2xl font-bold">Transacciones</h1>
          <button class="px-6 py-2 bg-orange-500 hover:bg-orange-600 rounded-lg font-semibold transition">+ Nueva</button>
        </div>
        <div class="flex gap-4 items-center">
          <input type="text" placeholder="Buscar..." class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm flex-1"/>
          <select class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm">
            <option>Todos los tipos</option><option>Ingresos</option><option>Gastos</option>
          </select>
          <button class="px-4 py-2 border border-gray-700 hover:border-orange-500 rounded-lg text-sm transition">📥 Exportar</button>
        </div>
      </div>
    </header>

    <div class="p-8">
      <div class="grid grid-cols-4 gap-6 mb-8">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <p class="text-sm text-gray-400">Total ingresos</p>
          <p class="text-3xl font-bold text-green-400 mt-2">€7,240</p>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <p class="text-sm text-gray-400">Total gastos</p>
          <p class="text-3xl font-bold text-red-400 mt-2">€1,100</p>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <p class="text-sm text-gray-400">Balance</p>
          <p class="text-3xl font-bold text-orange-400 mt-2">€6,140</p>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <p class="text-sm text-gray-400">Transacciones</p>
          <p class="text-3xl font-bold text-blue-400 mt-2">42</p>
        </div>
      </div>

      <div class="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-700/50 border-b border-gray-700">
            <tr>
              <th class="px-6 py-4 text-left text-sm font-semibold">Fecha</th>
              <th class="px-6 py-4 text-left text-sm font-semibold">Tipo</th>
              <th class="px-6 py-4 text-left text-sm font-semibold">Cliente</th>
              <th class="px-6 py-4 text-left text-sm font-semibold">Monto</th>
              <th class="px-6 py-4 text-left text-sm font-semibold">Estado</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-700">
            <tr class="hover:bg-gray-700/30">
              <td class="px-6 py-4 text-sm">12 jun</td>
              <td class="px-6 py-4"><span class="px-2 py-1 bg-green-500/20 text-green-300 text-xs rounded">Ingreso</span></td>
              <td class="px-6 py-4">Ana García</td>
              <td class="px-6 py-4 text-green-400 font-semibold">+€55</td>
              <td class="px-6 py-4"><span class="px-2 py-1 bg-green-500/20 text-green-300 text-xs rounded">Pagado</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</body>
</html>

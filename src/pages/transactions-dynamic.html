<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transacciones — Diabolus CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white">
  <div class="fixed left-0 top-0 w-64 h-screen bg-black border-r border-gray-800 flex flex-col z-40">
    <div class="p-6 border-b border-gray-800"><div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center font-bold">⚡</div>
      <span class="font-bold text-xl">DIABOLUS</span></div></div>
    <nav class="flex-1 p-4 space-y-2">
      <a href="/dashboard" class="block px-4 py-3 text-gray-400">📊 Dashboard</a>
      <a href="/transactions" class="block px-4 py-3 bg-orange-500/20 text-orange-400">💰 Transacciones</a>
      <a href="/clients" class="block px-4 py-3 text-gray-400">👥 Clientes</a>
      <a href="/reports" class="block px-4 py-3 text-gray-400">📈 Reportes</a>
      <a href="/chat-premium" class="block px-4 py-3 text-gray-400">💬 Chat IA</a>
    </nav>
  </div>
  <main class="ml-64 min-h-screen"><header class="bg-black/50 border-b border-gray-800 sticky top-0">
    <div class="px-8 py-4"><h1 class="text-2xl font-bold">Transacciones</h1></div></header>
    <div class="p-8">
      <div class="grid grid-cols-4 gap-6 mb-8">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <p class="text-sm text-gray-400">Ingresos</p>
          <p class="text-3xl font-bold text-green-400 mt-2">€<span id="income">0</span></p>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <p class="text-sm text-gray-400">Gastos</p>
          <p class="text-3xl font-bold text-red-400 mt-2">€<span id="expenses">0</span></p>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <p class="text-sm text-gray-400">Balance</p>
          <p class="text-3xl font-bold text-orange-400 mt-2">€<span id="balance">0</span></p>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <p class="text-sm text-gray-400">Total</p>
          <p class="text-3xl font-bold text-blue-400 mt-2"><span id="count">0</span></p>
        </div>
      </div>
      <div class="bg-gray-800 border border-gray-700 rounded-lg"><div id="loading">Cargando...</div></div>
    </div>
  </main>
  <script>
    async function load() {
      try {
        const res = await fetch('/api/transactions', {headers: {'Authorization': 'Bearer test', 'X-Salon-ID': 'test'}});
        const data = await res.json();
        document.getElementById('income').textContent = (data.income || 0).toFixed(2);
        document.getElementById('expenses').textContent = (data.expenses || 0).toFixed(2);
        document.getElementById('balance').textContent = (data.balance || 0).toFixed(2);
        document.getElementById('count').textContent = data.total || 0;
        document.getElementById('loading').innerHTML = '<p class="p-6 text-gray-400">Datos cargados</p>';
      } catch (e) {
        document.getElementById('loading').innerHTML = '<p class="p-6 text-red-400">Error cargando</p>';
      }
    }
    load();
  </script>
</body>
</html>

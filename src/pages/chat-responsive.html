<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat IA — Diabolus CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { width: 100%; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white h-screen flex flex-col">
  <script>if(!localStorage.getItem("token"))window.location.href="/login";</script>
  
  <header class="bg-black/50 border-b border-gray-800 px-3 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
    <div class="flex items-center gap-2 sm:gap-4">
      <div class="w-8 sm:w-12 h-8 sm:h-12 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center font-bold text-sm sm:text-lg">⚡</div>
      <div>
        <h1 class="text-lg sm:text-2xl font-bold">Chat</h1>
        <p class="text-xs text-gray-400 hidden sm:block">Asistente IA</p>
      </div>
    </div>
    <div class="flex gap-2 sm:gap-4">
      <button onclick="location.href='/dashboard'" class="text-xs sm:text-base text-gray-400 hover:text-white">📊</button>
      <button onclick="location.href='/logout'" class="text-xs sm:text-base text-gray-400 hover:text-white">🚪</button>
    </div>
  </header>

  <div class="flex-1 flex gap-4 overflow-hidden p-3 sm:p-6">
    <div class="flex-1 flex flex-col">
      <div class="flex-1 overflow-y-auto space-y-3 mb-4 pr-2" id="messagesContainer">
        <div class="text-center"><h2 class="text-xl font-bold">Hola 👋</h2><p class="text-sm text-gray-400 mt-2">¿Qué registramos?</p></div>
      </div>

      <div class="space-y-3">
        <div class="flex gap-2 overflow-x-auto pb-2">
          <button onclick="sendMessage('He cobrado 450€')" class="px-2 sm:px-4 py-2 bg-gray-800 border border-gray-700 rounded-full text-xs sm:text-sm whitespace-nowrap">💰 Ingreso</button>
          <button onclick="sendMessage('¿Cuánto gané?')" class="px-2 sm:px-4 py-2 bg-gray-800 border border-gray-700 rounded-full text-xs sm:text-sm whitespace-nowrap">📊 Resumen</button>
        </div>

        <div class="flex gap-2">
          <input type="text" id="messageInput" placeholder="Tu mensaje..." class="flex-1 px-3 sm:px-4 py-2 sm:py-3 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none focus:border-orange-500"/>
          <button id="sendBtn" onclick="sendMessage()" class="px-3 sm:px-4 py-2 sm:py-3 bg-orange-500 rounded-lg text-sm font-semibold">✈️</button>
        </div>
      </div>
    </div>

    <div class="sidebar hidden md:flex md:flex-col md:w-64 border-l border-gray-800 pl-6 space-y-6">
      <div>
        <h3 class="text-sm font-bold text-gray-400 mb-3">HOY</h3>
        <div class="space-y-2">
          <div class="bg-gray-800/50 rounded-lg p-3">
            <p class="text-xs text-gray-400">Ganancia</p>
            <p class="text-xl font-bold text-orange-400" id="todayEarnings">€0.00</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/components/validations.js"></script>
  <script>
    const getToken = () => localStorage.getItem('token') || '';
    const getSalonId = () => localStorage.getItem('salon_id') || '';

    async function sendMessage(msg) {
      const message = msg || document.getElementById('messageInput').value.trim();
      if (!message) return;

      const container = document.getElementById('messagesContainer');
      if (container.querySelector('h2')) container.innerHTML = '';

      const userDiv = document.createElement('div');
      userDiv.className = 'flex justify-end';
      userDiv.innerHTML = `<div class="max-w-xs bg-orange-500/30 border border-orange-500 rounded-lg p-3"><p class="text-sm">${message}</p></div>`;
      container.appendChild(userDiv);

      document.getElementById('messageInput').value = '';
      document.getElementById('sendBtn').disabled = true;

      try {
        const response = await fetch('/api/agent', {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}`, 'X-Salon-ID': getSalonId()},
          body: JSON.stringify({message})
        });

        const data = await response.json();
        const agentDiv = document.createElement('div');
        agentDiv.className = 'flex justify-start';
        agentDiv.innerHTML = `<div class="max-w-xs bg-gray-800 border border-gray-700 rounded-lg p-3"><p class="text-sm text-gray-300">${data.outcome || 'OK'}</p></div>`;
        container.appendChild(agentDiv);
        container.scrollTop = container.scrollHeight;
      } catch(e) {
        console.error(e);
      } finally {
        document.getElementById('sendBtn').disabled = false;
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reportes — Diabolus CRM</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white">
<div class="fixed left-0 top-0 w-64 h-screen bg-black border-r border-gray-800 flex flex-col z-40"><div class="p-6 border-b border-gray-800"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center">⚡</div><span class="font-bold text-xl">DIABOLUS</span></div></div>
<nav class="flex-1 p-4 space-y-2"><a href="/dashboard" class="block px-4 py-3 text-gray-400">📊 Dashboard</a><a href="/transactions" class="block px-4 py-3 text-gray-400">💰 Transacciones</a><a href="/clients" class="block px-4 py-3 text-gray-400">👥 Clientes</a><a href="/reports" class="block px-4 py-3 bg-orange-500/20 text-orange-400">📈 Reportes</a><a href="/chat-premium" class="block px-4 py-3 text-gray-400">💬 Chat IA</a></nav></div>
<main class="ml-64 min-h-screen"><header class="bg-black/50 border-b border-gray-800 sticky top-0"><div class="px-8 py-4"><h1 class="text-2xl font-bold">Reportes</h1></div></header>
<div class="p-8"><div class="bg-gradient-to-r from-orange-500/20 to-orange-600/10 border border-orange-500/30 rounded-lg p-6 mb-8"><h2 class="text-xl font-bold mb-4">Resumen Semanal</h2>
<div class="grid grid-cols-4 gap-4"><div><p class="text-sm text-gray-400">Ingresos</p><p class="text-2xl font-bold text-orange-400">€<span id="income">0</span></p></div><div><p class="text-sm text-gray-400">Gastos</p><p class="text-2xl font-bold text-red-400">€<span id="expenses">0</span></p></div><div><p class="text-sm text-gray-400">Balance</p><p class="text-2xl font-bold text-blue-400">€<span id="balance">0</span></p></div><div><p class="text-sm text-gray-400">Transacciones</p><p class="text-2xl font-bold text-purple-400"><span id="count">0</span></p></div></div></div>
<div class="grid grid-cols-2 gap-8"><div class="bg-gray-800 border border-gray-700 rounded-lg p-6"><h3 class="text-lg font-bold mb-4">Ingresos</h3><div style="position:relative;height:250px"><canvas id="chart1"></canvas></div></div><div class="bg-gray-800 border border-gray-700 rounded-lg p-6"><h3 class="text-lg font-bold mb-4">Gastos</h3><div style="position:relative;height:250px"><canvas id="chart2"></canvas></div></div></div></div></main>
<script>
async function load() {
  try {
    const res = await fetch('/api/reports', {headers: {'Authorization': 'Bearer test', 'X-Salon-ID': 'test'}});
    const data = await res.json();
    document.getElementById('income').textContent = (data.weekIncome || 0).toFixed(2);
    document.getElementById('expenses').textContent = (data.weekExpenses || 0).toFixed(2);
    document.getElementById('balance').textContent = (data.netWeek || 0).toFixed(2);
    document.getElementById('count').textContent = data.transactionCount || 0;
    
    // Chart 1
    const ctx1 = document.getElementById('chart1').getContext('2d');
    new Chart(ctx1, {type:'line', data: {labels:['L','M','X','J','V','S','D'], datasets:[{label:'Ingresos',data:[220,280,260,320,350,310,120],borderColor:'#10b981',fill:true}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#9ca3af'}}}}});
    
    // Chart 2
    const ctx2 = document.getElementById('chart2').getContext('2d');
    new Chart(ctx2, {type:'doughnut', data: {labels:['Productos','Electricidad','Alquiler','Otros'], datasets:[{data:[220,120,100,30], backgroundColor:['#ef4444','#f59e0b','#8b5cf6','#6b7280']}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#9ca3af'}}}}});
  } catch(e) {
    console.error(e);
  }
}
load();
</script></body></html>

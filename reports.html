<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diabolus CRM — Reportes</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diabolus">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .main-container { display: flex; min-height: 100vh; background-color: var(--bg-primary); }
    .sidebar { width: 280px; background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%); border-right: 1px solid var(--border-color); padding: 2rem 0; display: flex; flex-direction: column; position: fixed; height: 100vh; left: 0; top: 0; overflow-y: auto; }
    .sidebar-header { padding: 0 1.5rem 2rem; text-align: center; border-bottom: 1px solid var(--border-color); margin-bottom: 1.5rem; }
    .sidebar-header .logo { font-size: 2rem; margin-bottom: 0.5rem; }
    .sidebar-header h3 { margin: 0; font-size: 1.125rem; }
    .sidebar-nav { flex: 1; padding: 0 1rem; }
    .nav-item { padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; transition: all 0.3s ease; color: var(--text-secondary); text-decoration: none; font-weight: 600; }
    .nav-item:hover { background-color: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; box-shadow: 0 0 15px rgba(139, 21, 56, 0.3); }
    .nav-item span { font-size: 1.25rem; }
    .sidebar-footer { padding: 1.5rem; border-top: 1px solid var(--border-color); }
    .sidebar-footer button { width: 100%; }
    .main-content { margin-left: 280px; flex: 1; padding: 2rem; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); }
    .header h1 { margin: 0; }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
    .chart-card { background-color: var(--bg-secondary); border: 1px solid rgba(139,92,246,.35); border-radius: 0.75rem; padding: 1.5rem; box-shadow: 0 0 18px rgba(139,92,246,.12), inset 0 0 6px rgba(139,92,246,.06); }
    .chart-card h3 { margin-top: 0; margin-bottom: 1.5rem; }
    .chart-container { position: relative; height: 300px; }
    @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border-color); } .main-content { margin-left: 0; } .charts-grid { grid-template-columns: 1fr; } }
  </style>
  <link rel="stylesheet" href="diabolus-tokens.css">
</head>
<body>
  <div class="main-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">⚡</div>
        <h3>DIABOLUS</h3>
      </div>
      <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span>📊</span>Dashboard</a>
      <a href="chat.html" class="nav-item"><span>💬</span>Agente</a>
      <a href="invoices.html" class="nav-item"><span>📄</span>Facturas</a>
      <a href="clients.html" class="nav-item"><span>👥</span>Clientes</a>
      <a href="transactions.html" class="nav-item"><span>💰</span>Transacciones</a>
      <a href="reports.html" class="nav-item active"><span>📈</span>Reportes</a>
      <a href="documents.html" class="nav-item"><span>✍️</span>Documentos</a>
      <a href="cazador.html" class="nav-item"><span>🦅</span>Cazador</a>
      <a href="legal.html"        class="nav-item"><span class="nav-icon">⚖️</span> Legal</a>
        <a href="pacto.html?v=2"        class="nav-item"><span class="nav-icon">🔥</span> El Pacto</a>
    </nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary" style="width: 100%;" onclick="logout()">Cerrar Sesión</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="header">
        <h1>📈 Reportes</h1>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <h3>Ingresos vs Gastos (30 días)</h3>
          <div class="chart-container">
            <canvas id="incomeExpenseChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>Margen de Beneficio</h3>
          <div class="chart-container">
            <canvas id="marginChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>Top Clientes (por ingresos)</h3>
          <div class="chart-container">
            <canvas id="topClientsChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>Distribución de Gastos</h3>
          <div class="chart-container">
            <canvas id="expenseDistributionChart"></canvas>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ─── Auth ────────────────────────────────────────────────────────────────
    (function() {
      let token = null
      try { token = JSON.parse(localStorage.getItem('diabolus_auth'))?.token } catch(e) {}
      if (!token) { window.location.href = 'index-login.html' }
    })()
    function logout() {
      localStorage.removeItem('diabolus_auth')
      window.location.href = 'index-login.html'
    }
  </script>
  <script src="js/app.js"></script>
  <script>
    // Chart 1: Ingresos vs Gastos
    const incomeCtx = document.getElementById('incomeExpenseChart').getContext('2d');
    new Chart(incomeCtx, {
      type: 'bar',
      data: {
        labels: ['Sem 1', 'Sem 2', 'Sem 3', 'Sem 4'],
        datasets: [
          { label: 'Ingresos', data: [2100, 2450, 2300, 2800], backgroundColor: 'var(--success)' },
          { label: 'Gastos', data: [800, 920, 850, 1100], backgroundColor: 'var(--danger)' }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: { ticks: { color: 'var(--text-secondary)' }, grid: { color: 'var(--border-color)' } },
          x: { ticks: { color: 'var(--text-secondary)' }, grid: { color: 'var(--border-color)' } }
        },
        plugins: { legend: { labels: { color: 'var(--text-secondary)' } } }
      }
    });

    // Chart 2: Margen
    const marginCtx = document.getElementById('marginChart').getContext('2d');
    new Chart(marginCtx, {
      type: 'line',
      data: {
        labels: ['Sem 1', 'Sem 2', 'Sem 3', 'Sem 4'],
        datasets: [{
          label: 'Margen (%)',
          data: [62, 62.4, 63.0, 60.7],
          borderColor: 'var(--gold)',
          backgroundColor: 'rgba(255, 215, 0, 0.1)',
          borderWidth: 3,
          fill: true,
          pointBackgroundColor: 'var(--gold)',
          pointBorderColor: 'white',
          pointBorderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { ticks: { color: 'var(--text-secondary)' }, grid: { color: 'var(--border-color)' } },
          x: { ticks: { color: 'var(--text-secondary)' }, grid: { color: 'var(--border-color)' } }
        }
      }
    });

    // Chart 3: Top Clientes
    const topCtx = document.getElementById('topClientsChart').getContext('2d');
    new Chart(topCtx, {
      type: 'bar',
      data: {
        labels: ['Paula G.', 'Ana M.', 'María L.', 'José C.', 'Laura F.'],
        datasets: [{
          label: 'Ingresos',
          data: [1450, 2340, 980, 650, 1890],
          backgroundColor: 'var(--primary)'
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: { ticks: { color: 'var(--text-secondary)' }, grid: { color: 'var(--border-color)' } },
          y: { ticks: { color: 'var(--text-secondary)' } }
        },
        plugins: { legend: { display: false } }
      }
    });

    // Chart 4: Gastos
    const expenseCtx = document.getElementById('expenseDistributionChart').getContext('2d');
    new Chart(expenseCtx, {
      type: 'doughnut',
      data: {
        labels: ['Suministros', 'Alquiler', 'Servicios', 'Otros'],
        datasets: [{
          data: [1800, 4200, 2400, 1900],
          backgroundColor: ['var(--primary)', 'var(--primary-light)', 'var(--gold)', 'rgba(139, 21, 56, 0.5)']
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: 'var(--text-secondary)' } } }
      }
    });
  </script>
  <script>
    // PWA — registro del Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('[SW] registrado:', reg.scope);
        }).catch(err => {
          console.warn('[SW] error al registrar:', err);
        });
      });
    }
  </script>
</body>
</html>

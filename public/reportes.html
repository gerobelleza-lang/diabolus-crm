<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — Diabolus CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white">
  <div class="flex h-screen">
    <div class="w-64 bg-black border-r border-gray-800 p-6 fixed left-0 top-0 h-screen">
      <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center">⚡</div>
        <span class="font-bold text-xl">DIABOLUS</span>
      </div>
      <nav class="space-y-2">
        <a href="/dashboard.html" class="block px-4 py-3 text-gray-400 hover:bg-gray-800 rounded">📊 Dashboard</a>
        <a href="/transacciones.html" class="block px-4 py-3 text-gray-400 hover:bg-gray-800 rounded">💰 Transacciones</a>
        <a href="/clientes.html" class="block px-4 py-3 text-gray-400 hover:bg-gray-800 rounded">👥 Clientes</a>
        <a href="/reportes.html" class="block px-4 py-3 bg-orange-500/20 border-l-2 border-orange-500 text-orange-400 rounded">📈 Reportes</a>
      </nav>
      <div class="border-t border-gray-800 mt-auto pt-4">
        <button onclick="logout()" class="w-full px-4 py-3 text-gray-400 hover:bg-gray-800 rounded">🚪 Salir</button>
      </div>
    </div>

    <main class="ml-64 flex-1 overflow-auto p-8">
      <h1 class="text-4xl font-bold mb-8">Reportes</h1>
      <div class="grid grid-cols-4 gap-6 mb-8">
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6"><p class="text-gray-400 text-sm">Ingresos semana</p><p class="text-3xl font-bold text-green-400 mt-2">€3,250</p></div>
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6"><p class="text-gray-400 text-sm">Gastos semana</p><p class="text-3xl font-bold text-red-400 mt-2">€850</p></div>
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6"><p class="text-gray-400 text-sm">Balance</p><p class="text-3xl font-bold text-blue-400 mt-2">€2,400</p></div>
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6"><p class="text-gray-400 text-sm">Transacciones</p><p class="text-3xl font-bold text-purple-400 mt-2">23</p></div>
      </div>

      <div class="grid grid-cols-2 gap-8 mb-8">
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6">
          <h3 class="text-lg font-bold mb-4">Ingresos diarios</h3>
          <div style="position: relative; height: 250px;">
            <canvas id="chartDaily"></canvas>
          </div>
        </div>

        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6">
          <h3 class="text-lg font-bold mb-4">Distribución gastos</h3>
          <div style="position: relative; height: 250px;">
            <canvas id="chartExpenses"></canvas>
          </div>
        </div>
      </div>

      <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6">
        <h3 class="text-lg font-bold mb-4">Top servicios</h3>
        <div class="space-y-3">
          <div class="flex items-center justify-between">
            <p class="text-sm font-semibold">Corte</p>
            <div class="w-40 bg-gray-700 rounded h-2"><div class="bg-orange-500 h-2 rounded" style="width: 45%"></div></div>
            <p class="font-bold text-orange-400 w-20 text-right">€585</p>
          </div>
          <div class="flex items-center justify-between">
            <p class="text-sm font-semibold">Tinte</p>
            <div class="w-40 bg-gray-700 rounded h-2"><div class="bg-blue-500 h-2 rounded" style="width: 32%"></div></div>
            <p class="font-bold text-blue-400 w-20 text-right">€415</p>
          </div>
          <div class="flex items-center justify-between">
            <p class="text-sm font-semibold">Manicura</p>
            <div class="w-40 bg-gray-700 rounded h-2"><div class="bg-purple-500 h-2 rounded" style="width: 18%"></div></div>
            <p class="font-bold text-purple-400 w-20 text-right">€235</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    if (!localStorage.getItem('token')) window.location.href = '/';
    function logout() { localStorage.clear(); window.location.href = '/'; }

    function initCharts() {
      const ctx1 = document.getElementById('chartDaily').getContext('2d');
      new Chart(ctx1, {
        type: 'line',
        data: {
          labels: ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'],
          datasets: [{
            label: 'Ingresos',
            data: [220, 280, 260, 320, 350, 310, 120],
            borderColor: '#10b981',
            backgroundColor: 'rgba(16, 185, 129, 0.1)',
            borderWidth: 3,
            fill: true,
            tension: 0.4
          }]
        },
        options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {color: '#9ca3af'}}}, scales: {y: {ticks: {color: '#9ca3af'}, grid: {color: '#374151'}}, x: {ticks: {color: '#9ca3af'}}}}
      });

      const ctx2 = document.getElementById('chartExpenses').getContext('2d');
      new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: ['Productos', 'Electricidad', 'Alquiler', 'Otros'],
          datasets: [{
            data: [220, 120, 100, 30],
            backgroundColor: ['#ef4444', '#f59e0b', '#8b5cf6', '#6b7280'],
            borderColor: '#111827',
            borderWidth: 2
          }]
        },
        options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {position: 'bottom', labels: {color: '#9ca3af'}}}}
      });
    }

    document.addEventListener('DOMContentLoaded', initCharts);
  </script>
</body>
</html>

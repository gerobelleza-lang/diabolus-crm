<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Diabolus CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white">
  <div class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md mx-auto px-4">
      <div class="bg-gray-800/40 backdrop-blur border border-gray-700 rounded-2xl p-8 shadow-2xl">
        <div class="flex justify-center mb-8">
          <div class="w-16 h-16 bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl flex items-center justify-center font-bold text-2xl shadow-lg">⚡</div>
        </div>

        <h1 class="text-3xl font-bold text-center mb-2">DIABOLUS</h1>
        <p class="text-gray-400 text-center mb-8">CRM para pequeños negocios</p>

        <div id="errorMsg" class="hidden bg-red-500/20 border border-red-500 text-red-300 px-4 py-3 rounded mb-4 text-sm"></div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold mb-2">Email</label>
            <input type="email" id="email" required class="w-full px-4 py-3 bg-gray-700/50 border border-gray-600 rounded-lg focus:outline-none focus:border-orange-500" placeholder="tu@email.com" />
          </div>

          <div>
            <label class="block text-sm font-semibold mb-2">Contraseña</label>
            <input type="password" id="password" required class="w-full px-4 py-3 bg-gray-700/50 border border-gray-600 rounded-lg focus:outline-none focus:border-orange-500" placeholder="••••••••" />
          </div>

          <button type="button" id="submitBtn" onclick="handleLogin()"
            class="w-full px-6 py-3 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 rounded-lg font-semibold transition">
            Entrar
          </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
          Demo: prueba con cualquier email/contraseña
        </p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://emygbvxkhfbwyhbapaae.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVteWdidnhraGZid3loYmFwYWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODM3MjcsImV4cCI6MjA5Njg1OTcyN30.HpcYlWwggML7FGHLKerj17sLwj3CiFmYKZdL4iSV9YM';

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      if (!email || !password) {
        errorMsg.textContent = 'Introduce email y contraseña.';
        errorMsg.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando...';
      errorMsg.classList.add('hidden');

      try {
        // Inicializa Supabase de forma lazy
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
          // Fallback demo: cualquier credencial entra
          console.warn('Supabase auth fallback (demo):', error.message);
          _saveSession('demo-token-' + Date.now(), email);
          return;
        }

        // Sesión real de Supabase
        _saveSession(data.session.access_token, email);

      } catch (err) {
        console.error('Login error:', err);
        // Fallback demo
        _saveSession('demo-token-' + Date.now(), email);
      }
    }

    function _saveSession(token, email) {
      localStorage.setItem('token', token);
      localStorage.setItem('email', email);
      localStorage.setItem('user', JSON.stringify({
        email,
        name: email.split('@')[0],
        business: 'Mi Negocio'
      }));
      window.location.href = '/diabolus-crm/dashboard.html';
    }

    // También permitir Enter en el formulario
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginForm').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
    });
  </script>
</body>
</html>

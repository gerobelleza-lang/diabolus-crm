<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8b1538">
  <meta name="description" content="CRM inteligente con Agent IA para negocios. Diabolus.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diabolus">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%238b1538' width='180' height='180'/><text x='90' y='90' font-size='100' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='white'>⚡</text></svg>">
  <title>Diabolus CRM — Login</title>
  <link rel="stylesheet" href="css/custom.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0A0E27 0%, #1A1F3A 100%);
      padding: 2rem;
    }

    .login-box {
      background-color: var(--bg-secondary);
      border: 2px solid var(--primary);
      border-radius: 1rem;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(139, 21, 56, 0.3);
    }

    .login-box h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }

    .login-box .subtitle {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
    }

    .divider {
      text-align: center;
      margin: 2rem 0;
      color: var(--text-tertiary);
    }

    .divider::before {
      content: '';
      display: block;
      height: 1px;
      background: var(--border-color);
      margin-bottom: 1rem;
    }

    .demo-info {
      background-color: var(--bg-tertiary);
      border-left: 3px solid var(--gold);
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 2rem;
      font-size: 0.875rem;
    }

    .demo-info strong {
      color: var(--gold);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 3rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo">⚡</div>
      <h1>DIABOLUS</h1>
      <p class="subtitle">El negocio te obedece hablando.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" value="demo@diabolus.com" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" value="demo1234" required>
        </div>

        <button type="submit" class="btn btn-primary login-btn">
          ENTRAR EN LA COFRADÍA
        </button>
      </form>

      <div class="divider">O</div>

      <button class="btn btn-secondary" style="width: 100%;" onclick="loginAsDemo()">
        MODO DEMO (Quick Access)
      </button>

      <div class="demo-info">
        <strong>Demo Account:</strong><br>
        Email: demo@diabolus.com<br>
        Pass: demo1234<br>
        Negocio: Peluquería Infernal
      </div>
    </div>
  </div>

  <script>
    function loginAsDemo() {
      localStorage.setItem('diabolus_auth', JSON.stringify({
        userId: 'user_123',
        email: 'demo@diabolus.com',
        salonId: 'salon_456',
        salonName: 'Peluquería Infernal',
        token: 'mock_token_xyz'
      }));
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      loginAsDemo();
    });

    // Registrar Service Worker para PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then((reg) => console.log('✅ PWA ready'))
        .catch((err) => console.log('SW error:', err));
    }
  </script>
</body>
</html>

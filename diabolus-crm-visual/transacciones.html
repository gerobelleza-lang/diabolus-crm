<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transacciones — Diabolus CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white">
  <div class="flex h-screen">
    <div class="w-64 bg-black border-r border-gray-800 flex flex-col fixed left-0 top-0 h-screen">
      <div class="p-6 border-b border-gray-800">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center font-bold">⚡</div>
          <span class="font-bold text-xl">DIABOLUS</span>
        </div>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a href="dashboard.html" class="block px-4 py-3 text-gray-400 hover:bg-gray-800 rounded transition">📊 Dashboard</a>
        <a href="transacciones.html" class="block px-4 py-3 bg-orange-500/20 border-l-2 border-orange-500 text-orange-400 rounded">💰 Transacciones</a>
        <a href="clientes.html" class="block px-4 py-3 text-gray-400 hover:bg-gray-800 rounded transition">👥 Clientes</a>
        <a href="reportes.html" class="block px-4 py-3 text-gray-400 hover:bg-gray-800 rounded transition">📈 Reportes</a>
      </nav>
      <div class="p-4 border-t border-gray-800">
        <button onclick="logout()" class="w-full px-4 py-3 text-gray-400 hover:bg-gray-800 rounded transition text-sm">🚪 Salir</button>
      </div>
    </div>

    <main class="ml-64 flex-1 overflow-auto p-8">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-4xl font-bold">Transacciones</h1>
          <p class="text-gray-400 mt-1">Últimos 30 días</p>
        </div>
        <button class="px-4 py-2 bg-orange-500 hover:bg-orange-600 rounded-lg font-semibold transition">+ Nueva transacción</button>
      </div>

      <div class="grid grid-cols-4 gap-6 mb-8">
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6"><p class="text-gray-400 text-sm">Ingresos</p><p class="text-3xl font-bold text-green-400 mt-2">€0</p></div>
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6"><p class="text-gray-400 text-sm">Gastos</p><p class="text-3xl font-bold text-red-400 mt-2">€0</p></div>
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6"><p class="text-gray-400 text-sm">Balance</p><p class="text-3xl font-bold text-orange-400 mt-2">€0</p></div>
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-6"><p class="text-gray-400 text-sm">Nº transacciones</p><p class="text-3xl font-bold text-white mt-2">0</p></div>
      </div>

      <div class="bg-gray-800/50 border border-gray-700 rounded-xl overflow-hidden">
        <div id="emptyTransactions" class="text-center py-16">
          <p class="text-4xl mb-3">💰</p>
          <p class="text-gray-400 mb-4">Aún no hay transacciones</p>
          <button class="px-4 py-2 bg-orange-500 hover:bg-orange-600 rounded-lg text-sm font-semibold transition">+ Añadir primera transacción</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    if (!localStorage.getItem('token')) window.location.href = 'index.html';
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
  </script>
</body>
</html>

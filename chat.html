<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diabolus · Agente</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0b12;
      --surface:     #13131f;
      --surface2:    #1c1c2e;
      --border:      #2a2a40;
      --accent:      #7c3aed;
      --accent-glow: #9d5cff;
      --user-bubble: #1a1040;
      --user-text:   #e0d9ff;
      --agent-bubble:#1c1c2e;
      --agent-text:  #e8e8f0;
      --text-muted:  #6b6b8a;
      --green:       #22c55e;
      --red:         #ef4444;
      --card-bg:     #16162a;
      --card-border: #3b3b6b;
      --radius:      16px;
      --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--agent-text); font-family: var(--font); }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo-wrap {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #3b0fa0);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-info h1 { font-size: 16px; font-weight: 700; color: #f0f0ff; letter-spacing: 0.3px; }
    .header-info p  { font-size: 12px; color: var(--green); margin-top: 1px; }
    .header-actions a {
      font-size: 12px; color: var(--text-muted);
      text-decoration: none; border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 8px;
      transition: color .2s, border-color .2s;
    }
    .header-actions a:hover { color: var(--accent-glow); border-color: var(--accent); }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Bubbles ── */
    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }
    .msg-row.user  { align-self: flex-end; align-items: flex-end; }
    .msg-row.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.user  .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
      border: 1px solid rgba(124,58,237,.35);
    }
    .msg-row.agent .bubble {
      background: var(--agent-bubble);
      color: var(--agent-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg-time {
      font-size: 11px; color: var(--text-muted);
      margin-top: 4px; padding: 0 4px;
    }

    /* ── Confirmation card ── */
    .card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      overflow: hidden;
      max-width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    .card-header {
      background: linear-gradient(135deg, #1e0b50, #2d1060);
      padding: 12px 16px;
      border-bottom: 1px solid var(--card-border);
    }
    .card-header .card-title {
      font-size: 14px; font-weight: 700; color: #f0e8ff;
    }
    .card-header .card-subtitle {
      font-size: 11px; color: #a78bfa; margin-top: 2px;
    }
    .card-fields {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .card-field {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .card-field .field-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-field .field-value {
      font-size: 13.5px;
      color: #e8e8f0;
      text-align: right;
      font-weight: 500;
    }
    .card-field .field-value.importe {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
    }
    .card-actions {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--card-border);
    }
    .card-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 600;
      font-family: var(--font);
      transition: opacity .15s, background .15s;
    }
    .card-actions button:hover { opacity: .85; }
    .card-actions button:active { opacity: .7; }
    .btn-confirm { background: var(--green); color: #fff; border-right: 1px solid var(--card-border); }
    .btn-cancel  { background: var(--surface2); color: var(--text-muted); }

    /* ── Typing indicator ── */
    #typing {
      display: none;
      align-self: flex-start;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
      background: var(--agent-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
    }
    #typing span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce .9s infinite ease-in-out;
    }
    #typing span:nth-child(2) { animation-delay: .15s; }
    #typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      display: flex;
      align-items: flex-end;
      padding: 8px 14px;
      gap: 8px;
      transition: border-color .2s;
    }
    #input-wrap:focus-within { border-color: var(--accent); }
    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e8e8f0;
      font-family: var(--font);
      font-size: 14.5px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--text-muted); }
    #btn-send {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), #3b0fa0);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
      box-shadow: 0 2px 10px rgba(124,58,237,.4);
    }
    #btn-send:hover  { transform: scale(1.07); }
    #btn-send:active { transform: scale(.95); opacity: .9; }
    #btn-send svg { width: 20px; height: 20px; fill: #fff; }

    /* ── Auth overlay ── */
    #auth-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 100;
      padding: 24px;
    }
    #auth-overlay.hidden { display: none; }
    #auth-overlay h2 { font-size: 20px; color: #f0f0ff; }
    #auth-overlay p  { font-size: 13px; color: var(--text-muted); text-align: center; max-width: 320px; }
    #auth-overlay a  {
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--accent), #3b0fa0);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    /* ── Error toast ── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a0a0a;
      color: #fca5a5;
      border: 1px solid var(--red);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      display: none;
      z-index: 50;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- Auth overlay (shown if no token) -->
<div id="auth-overlay">
  <div class="logo-wrap" style="width:56px;height:56px;font-size:28px">🧿</div>
  <h2>Diabolus · Agente</h2>
  <p>Necesitas iniciar sesión para hablar con el agente.</p>
  <a href="index-login.html">Ir al login</a>
</div>

<!-- Main app -->
<div id="app">
  <header>
    <div class="logo-wrap">🧿</div>
    <div class="header-info">
      <h1>Agente Diabolus</h1>
      <p id="status-text">● en línea</p>
    </div>
    <div class="header-actions">
      <a href="index.html">Dashboard →</a>
    </div>
  </header>

  <div id="messages">
    <!-- Welcome message inserted by JS -->
  </div>

  <div id="typing">
    <span></span><span></span><span></span>
  </div>

  <div id="input-bar">
    <div id="input-wrap">
      <textarea
        id="msg-input"
        rows="1"
        placeholder='Ej: "gasté 45€ en material hoy" · "cobré 300€ de Ana"'
        autocomplete="off"
        autocorrect="off"
        spellcheck="true"
      ></textarea>
    </div>
    <button id="btn-send" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────────
const API = 'https://diabolus-crm-api.vercel.app'

// ─── Auth ──────────────────────────────────────────────────────────────────────
let token = localStorage.getItem('diabolus_token')

const overlay = document.getElementById('auth-overlay')
if (token) {
  overlay.classList.add('hidden')
} else {
  // Try demo token for dev
  const DEV_TOKEN = 'dev_admin'
  token = DEV_TOKEN
  overlay.classList.add('hidden')
}

// ─── DOM refs ──────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages')
const typingEl   = document.getElementById('typing')
const inputEl    = document.getElementById('msg-input')
const sendBtn    = document.getElementById('btn-send')
const toastEl    = document.getElementById('toast')

// ─── State ─────────────────────────────────────────────────────────────────────
let pendingCardId = null   // pending_action_id of current card shown

// ─── Helpers ───────────────────────────────────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
}

function scrollToBottom(smooth = true) {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: smooth ? 'smooth' : 'instant' })
}

function showToast(msg, ms = 3500) {
  toastEl.textContent = msg
  toastEl.style.display = 'block'
  setTimeout(() => { toastEl.style.display = 'none' }, ms)
}

function showTyping() {
  typingEl.style.display = 'flex'
  messagesEl.parentNode.insertBefore(typingEl, messagesEl.nextSibling)
  scrollToBottom()
}
function hideTyping() {
  typingEl.style.display = 'none'
}

// ─── Add messages ─────────────────────────────────────────────────────────────

function addUserMsg(text) {
  const row = document.createElement('div')
  row.className = 'msg-row user'
  row.innerHTML = `
    <div class="bubble">${escHtml(text)}</div>
    <span class="msg-time">${now()}</span>
  `
  messagesEl.appendChild(row)
  scrollToBottom()
}

function addAgentMsg(text) {
  // Convert *bold* and simple newlines
  const html = escHtml(text)
    .replace(/\*([^*]+)\*/g, '<strong>$1</strong>')
  const row = document.createElement('div')
  row.className = 'msg-row agent'
  row.innerHTML = `
    <div class="bubble">${html}</div>
    <span class="msg-time">${now()}</span>
  `
  messagesEl.appendChild(row)
  scrollToBottom()
}

function addConfirmationCard(card) {
  pendingCardId = card.pending_action_id

  // Disable any existing card buttons
  document.querySelectorAll('.btn-confirm, .btn-cancel').forEach(b => {
    b.disabled = true
    b.style.opacity = '0.4'
    b.style.cursor = 'default'
  })

  const fieldsHtml = card.fields.map(f => `
    <div class="card-field">
      <span class="field-label">${escHtml(f.label)}</span>
      <span class="field-value ${f.label === 'Importe' ? 'importe' : ''}">${escHtml(f.value)}</span>
    </div>
  `).join('')

  const row = document.createElement('div')
  row.className = 'msg-row agent'
  row.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${escHtml(card.summary)}</div>
        <div class="card-subtitle">Revisa los datos antes de confirmar</div>
      </div>
      <div class="card-fields">${fieldsHtml}</div>
      <div class="card-actions">
        <button class="btn-confirm" data-id="${escHtml(card.pending_action_id)}">✓ Confirmar</button>
        <button class="btn-cancel"  data-id="${escHtml(card.pending_action_id)}">✕ Cancelar</button>
      </div>
    </div>
    <span class="msg-time">${now()} · Caduca en 10 min</span>
  `

  row.querySelector('.btn-confirm').addEventListener('click', handleConfirm)
  row.querySelector('.btn-cancel').addEventListener('click', handleCancel)

  messagesEl.appendChild(row)
  scrollToBottom()
}

// ─── API calls ─────────────────────────────────────────────────────────────────

async function apiPost(path, body) {
  const res = await fetch(`${API}${path}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    },
    body: JSON.stringify(body),
  })
  if (!res.ok) {
    const err = await res.json().catch(() => ({}))
    throw new Error(err.error || `HTTP ${res.status}`)
  }
  return res.json()
}

// ─── Send message ──────────────────────────────────────────────────────────────

async function sendMessage() {
  const text = inputEl.value.trim()
  if (!text) return

  inputEl.value = ''
  inputEl.style.height = 'auto'
  sendBtn.disabled = true

  addUserMsg(text)
  showTyping()

  try {
    const data = await apiPost('/api/agent/chat', { userInput: text })
    hideTyping()

    if (data.status === 'pending_confirmation' && data.card) {
      addConfirmationCard(data.card)
    } else if (data.status === 'needs_info') {
      addAgentMsg(data.message)
    } else if (data.message) {
      addAgentMsg(data.message)
    } else {
      addAgentMsg('Recibido, pero no entendí la respuesta del servidor.')
    }
  } catch (err) {
    hideTyping()
    addAgentMsg(`❌ Error: ${err.message}`)
    showToast(`Error: ${err.message}`)
  } finally {
    sendBtn.disabled = false
    inputEl.focus()
  }
}

// ─── Confirm action ────────────────────────────────────────────────────────────

async function handleConfirm(e) {
  const id = e.currentTarget.dataset.id
  disableCardButtons(e.currentTarget)
  showTyping()

  try {
    const data = await apiPost('/api/agent/confirm', { pending_action_id: id })
    hideTyping()

    if (data.status === 'success') {
      addAgentMsg(data.message || '✅ Hecho.')
    } else {
      addAgentMsg(`⚠️ ${data.message || 'No se pudo ejecutar.'}`)
    }
  } catch (err) {
    hideTyping()
    addAgentMsg(`❌ Error al confirmar: ${err.message}`)
  }

  pendingCardId = null
}

// ─── Cancel action ─────────────────────────────────────────────────────────────

async function handleCancel(e) {
  const id = e.currentTarget.dataset.id
  disableCardButtons(e.currentTarget)
  showTyping()

  try {
    await apiPost('/api/agent/cancel', { pending_action_id: id })
    hideTyping()
    addAgentMsg('Cancelado. No se ha guardado nada. 👍')
  } catch (err) {
    hideTyping()
    addAgentMsg(`❌ Error al cancelar: ${err.message}`)
  }

  pendingCardId = null
}

function disableCardButtons(btn) {
  const card = btn.closest('.card')
  if (!card) return
  card.querySelectorAll('button').forEach(b => {
    b.disabled = true
    b.style.opacity = '0.4'
    b.style.cursor = 'default'
  })
}

// ─── Input auto-resize ─────────────────────────────────────────────────────────

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto'
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px'
})

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
})

sendBtn.addEventListener('click', sendMessage)

// ─── XSS helper ───────────────────────────────────────────────────────────────

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

// ─── Welcome message ───────────────────────────────────────────────────────────

addAgentMsg(
`Hola 👋 Soy el agente de Diabolus.

Puedo gestionar tu tesorería si me lo dices en lenguaje natural:

• *"gasté 45€ en material hoy"*
• *"cobré 300€ de Ana por corte"*
• *"¿cuánto tengo este mes?"*
• *"¿quién me debe?"*

Antes de guardar cualquier cosa, te mostraré un resumen para que confirmes. ✅`
)

scrollToBottom(false)
inputEl.focus()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diabolus · Agente</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diabolus">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #15101F;
      --surface:     #211A33;
      --surface2:    #2A2140;
      --border:      rgba(139,92,246,.18);
      --accent:      #8B5CF6;
      --accent-glow: #9d5cff;
      --user-bubble: rgba(139,92,246,.14);
      --user-text:   #e0d9ff;
      --agent-bubble:#211A33;
      --agent-text:  #e8e8f0;
      --text-muted:  #A39FB5;
      --green:       #22c55e;
      --red:         #ef4444;
      --orange:      #f97316;
      --yellow:      #eab308;
      --card-bg:     #211A33;
      --card-border: rgba(139,92,246,.32);
      --radius:      16px;
      --font:        'Hanken Grotesk', 'Inter', system-ui, sans-serif;
    }

    html, body { height: 100%; background: var(--ink, var(--bg)); color: var(--agent-text); font-family: var(--font); }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo-wrap {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #3b0fa0);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-info h1 { font-size: 16px; font-weight: 700; color: #f0f0ff; letter-spacing: 0.3px; }
    .header-info p  { font-size: 12px; color: var(--green); margin-top: 1px; }
    .header-actions a {
      font-size: 12px; color: var(--text-muted);
      text-decoration: none; border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 8px;
      transition: color .2s, border-color .2s;
    }
    .header-actions a:hover { color: var(--accent-glow); border-color: var(--accent); }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Bubbles ── */
    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }
    .msg-row.user  { align-self: flex-end; align-items: flex-end; }
    .msg-row.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.user  .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
      border: 1px solid rgba(124,58,237,.35);
    }
    .msg-row.agent .bubble {
      background: var(--agent-bubble);
      color: var(--agent-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    /* ── Photo bubble (mensaje del usuario con foto) ── */
    .photo-bubble {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(124,58,237,.35);
      max-width: 220px;
      border-bottom-right-radius: 4px;
    }
    .photo-bubble img {
      width: 100%;
      display: block;
      object-fit: cover;
    }
    .photo-bubble .photo-caption {
      background: var(--user-bubble);
      padding: 6px 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .msg-time {
      font-size: 11px; color: var(--text-muted);
      margin-top: 4px; padding: 0 4px;
    }

    /* ── Confirmation card ── */
    .card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      overflow: hidden;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }

    /* Miniatura de foto dentro de la tarjeta */
    .card-photo-thumb {
      width: 100%;
      max-height: 140px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid var(--card-border);
      opacity: .9;
    }

    .card-header {
      background: linear-gradient(135deg, rgba(139,92,246,.22), rgba(109,40,217,.32));
      padding: 12px 16px;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header .card-title {
      font-size: 14px; font-weight: 700; color: #f0e8ff; flex: 1;
    }
    .card-header .card-subtitle {
      font-size: 11px; color: #a78bfa; margin-top: 2px;
    }
    .card-type-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-type-write { background: rgba(34,197,94,.15); color: #86efac; border: 1px solid rgba(34,197,94,.3); }
    .card-type-send  { background: rgba(249,115,22,.15); color: #fdba74; border: 1px solid rgba(249,115,22,.3); }
    .card-type-photo { background: rgba(139,92,246,.15); color: #c4b5fd; border: 1px solid rgba(139,92,246,.3); }

    /* Alerta de confianza media */
    .card-confidence-warning {
      margin: 0 16px 10px;
      padding: 7px 10px;
      background: rgba(234,179,8,.08);
      border: 1px solid rgba(234,179,8,.25);
      border-radius: 8px;
      font-size: 11.5px;
      color: #fde047;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .card-fields {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .card-field {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .card-field .field-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-field .field-value {
      font-size: 13.5px;
      color: #e8e8f0;
      text-align: right;
      font-weight: 500;
    }
    .card-field .field-value.importe {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
    }
    /* Campo dudoso: resaltado amarillo */
    .card-field.dudoso .field-label { color: #fde047; }
    .card-field.dudoso .field-value {
      color: #fde047;
      border-bottom: 1px dashed rgba(234,179,8,.5);
    }
    .card-field.dudoso .field-value::after {
      content: ' ⚠️';
      font-size: 11px;
    }

    /* ── Preview block (para envíos send) ── */
    .card-preview {
      margin: 0 16px 12px;
      background: rgba(139,92,246,.06);
      border: 1px solid rgba(249,115,22,.25);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .card-preview-label {
      font-size: 10px;
      font-weight: 600;
      color: #fdba74;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .card-preview-text {
      font-size: 13px;
      color: #d1d5db;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-actions {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--card-border);
    }
    .card-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 600;
      font-family: var(--font);
      transition: opacity .15s, background .15s;
    }
    .card-actions button:hover { opacity: .85; }
    .card-actions button:active { opacity: .7; }
    .btn-confirm { background: var(--green); color: #fff; border-right: 1px solid var(--card-border); }
    .btn-cancel  { background: var(--surface2); color: var(--text-muted); }
    .btn-confirm[disabled], .btn-cancel[disabled] { opacity: .35 !important; cursor: not-allowed; }

    /* ── Typing indicator ── */
    #typing {
      display: none;
      align-self: flex-start;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
      background: var(--agent-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      margin: 0 16px;
    }
    #typing .typing-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    #typing span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce .9s infinite ease-in-out;
    }
    #typing span:nth-child(2) { animation-delay: .15s; }
    #typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }

    /* ── Photo preview en input (antes de enviar) ── */
    #photo-preview-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #photo-preview-bar.visible { display: flex; }
    #photo-thumb-preview {
      width: 48px; height: 48px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    #photo-preview-info { flex: 1; }
    #photo-preview-info p { font-size: 12px; color: var(--agent-text); }
    #photo-preview-info span { font-size: 11px; color: var(--text-muted); }
    #btn-remove-photo {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color .15s;
    }
    #btn-remove-photo:hover { color: var(--red); }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      display: flex;
      align-items: flex-end;
      padding: 8px 14px;
      gap: 8px;
      transition: border-color .2s;
    }
    #input-wrap:focus-within { border-color: var(--accent); }

    /* Botón clip (adjuntar foto) */
    #btn-attach {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
      transition: color .15s;
      flex-shrink: 0;
      align-self: center;
    }
    #btn-attach:hover { color: var(--accent-glow); }
    #file-input { display: none; }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e8e8f0;
      font-family: var(--font);
      font-size: 14.5px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--text-muted); }
    #btn-send {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), #3b0fa0);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
      box-shadow: 0 2px 10px rgba(124,58,237,.4);
    }
    #btn-send:hover  { transform: scale(1.07); }
    #btn-send:active { transform: scale(.95); opacity: .9; }
    #btn-send svg { width: 20px; height: 20px; fill: #fff; }

    /* ── Auth overlay ── */
    #auth-overlay {
      position: fixed; inset: 0;
      background: var(--ink, var(--bg));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 100;
      padding: 24px;
    }
    #auth-overlay.hidden { display: none; }
    #auth-overlay h2 { font-size: 20px; color: #f0f0ff; }
    #auth-overlay p  { font-size: 13px; color: var(--text-muted); text-align: center; max-width: 320px; }
    #auth-overlay a  {
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--accent), #3b0fa0);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    /* ── Error toast ── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a0a0a;
      color: #fca5a5;
      border: 1px solid var(--red);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      display: none;
      z-index: 50;
      white-space: nowrap;
    }
  </style>
  <link rel="stylesheet" href="diabolus-tokens.css">
</head>
<body>

<!-- Auth overlay (shown if no token) -->
<div id="auth-overlay">
  <div class="logo-wrap" style="width:56px;height:56px;font-size:28px">🧿</div>
  <h2>Diabolus · Agente</h2>
  <p>Necesitas iniciar sesión para hablar con el agente.</p>
  <a href="index-login.html">Ir al login</a>
</div>

<!-- Main app -->
<div id="app">
  <header>
    <div class="logo-wrap">🧿</div>
    <div class="header-info">
      <h1>Agente Diabolus</h1>
      <p id="status-text">● en línea</p>
    </div>
    <div class="header-actions">
      <a href="index.html">Dashboard →</a>
    </div>
  </header>

  <div id="messages">
    <!-- Welcome message inserted by JS -->
  </div>

  <div id="typing">
    <span></span><span></span><span></span>
    <span class="typing-label" id="typing-label">escribiendo…</span>
  </div>

  <!-- Photo preview bar (visible cuando hay foto seleccionada) -->
  <div id="photo-preview-bar">
    <img id="photo-thumb-preview" src="" alt="Preview" />
    <div id="photo-preview-info">
      <p id="photo-preview-name">foto.jpg</p>
      <span id="photo-preview-size">—</span>
    </div>
    <button id="btn-remove-photo" title="Quitar foto">✕</button>
  </div>

  <div id="input-bar">
    <div id="input-wrap">
      <!-- Botón adjuntar foto -->
      <button id="btn-attach" title="Adjuntar foto de ticket o factura" aria-label="Adjuntar foto">
        📎
      </button>
      <input type="file" id="file-input" accept="image/*" capture="environment" />

      <textarea
        id="msg-input"
        rows="1"
        placeholder='Escribe o adjunta una foto de un ticket 📎'
        autocomplete="off"
        autocorrect="off"
        spellcheck="true"
      ></textarea>
    </div>
    <button id="btn-send" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────────
const API = 'https://diabolus-crm-api.vercel.app'
const MAX_IMAGE_BYTES = 5 * 1024 * 1024  // 5 MB

// ─── Auth ──────────────────────────────────────────────────────────────────────
let _auth = null
try { _auth = JSON.parse(localStorage.getItem('diabolus_auth')) } catch(e) {}
let token = _auth?.token || null
const overlay = document.getElementById('auth-overlay')
if (token) {
  overlay.classList.add('hidden')
} else {
  overlay.classList.remove('hidden')
}

// ─── DOM refs ──────────────────────────────────────────────────────────────────
const messagesEl       = document.getElementById('messages')
const typingEl         = document.getElementById('typing')
const typingLabelEl    = document.getElementById('typing-label')
const inputEl          = document.getElementById('msg-input')
const sendBtn          = document.getElementById('btn-send')
const toastEl          = document.getElementById('toast')
const attachBtn        = document.getElementById('btn-attach')
const fileInputEl      = document.getElementById('file-input')
const photoPreviewBar  = document.getElementById('photo-preview-bar')
const photoThumbEl     = document.getElementById('photo-thumb-preview')
const photoNameEl      = document.getElementById('photo-preview-name')
const photoSizeEl      = document.getElementById('photo-preview-size')
const removePhotoBtn   = document.getElementById('btn-remove-photo')

// Estado de foto pendiente
let pendingPhoto = null  // { file: File, objectUrl: string, base64: string, mimeType: string }

// ─── Helpers ───────────────────────────────────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
}

function scrollToBottom(smooth = true) {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: smooth ? 'smooth' : 'instant' })
}

function showToast(msg, ms = 3500) {
  toastEl.textContent = msg
  toastEl.style.display = 'block'
  setTimeout(() => { toastEl.style.display = 'none' }, ms)
}

function setTyping(label = 'escribiendo…') {
  typingLabelEl.textContent = label
  typingEl.style.display = 'flex'
  scrollToBottom()
}
function hideTyping() {
  typingEl.style.display = 'none'
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B'
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB'
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB'
}

// ─── File → base64 ────────────────────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onload = () => {
      // Quitar prefijo "data:image/jpeg;base64,"
      const result = reader.result
      const base64 = result.split(',')[1]
      resolve(base64)
    }
    reader.onerror = reject
    reader.readAsDataURL(file)
  })
}

// ─── Attach photo ─────────────────────────────────────────────────────────────
attachBtn.addEventListener('click', () => fileInputEl.click())

fileInputEl.addEventListener('change', async (e) => {
  const file = e.target.files?.[0]
  if (!file) return

  if (!file.type.startsWith('image/')) {
    showToast('Solo se aceptan imágenes (JPG, PNG, HEIC…)')
    return
  }

  if (file.size > MAX_IMAGE_BYTES) {
    showToast(`La imagen pesa ${formatBytes(file.size)}. Máximo 5 MB.`)
    fileInputEl.value = ''
    return
  }

  const objectUrl = URL.createObjectURL(file)
  const base64    = await fileToBase64(file)

  pendingPhoto = {
    file,
    objectUrl,
    base64,
    mimeType: file.type || 'image/jpeg',
  }

  // Mostrar preview bar
  photoThumbEl.src = objectUrl
  photoNameEl.textContent = file.name
  photoSizeEl.textContent = formatBytes(file.size)
  photoPreviewBar.classList.add('visible')

  // Limpiar input de archivo para permitir reseleccionar el mismo
  fileInputEl.value = ''
  inputEl.focus()
})

removePhotoBtn.addEventListener('click', clearPendingPhoto)

function clearPendingPhoto() {
  if (pendingPhoto?.objectUrl) URL.revokeObjectURL(pendingPhoto.objectUrl)
  pendingPhoto = null
  photoPreviewBar.classList.remove('visible')
  photoThumbEl.src = ''
  fileInputEl.value = ''
}

// ─── Add messages ─────────────────────────────────────────────────────────────

function addUserMsg(text) {
  const row = document.createElement('div')
  row.className = 'msg-row user'
  row.innerHTML = `
    <div class="bubble">${escHtml(text)}</div>
    <span class="msg-time">${now()}</span>
  `
  messagesEl.appendChild(row)
  scrollToBottom()
}

function addUserPhoto(objectUrl, fileName) {
  const row = document.createElement('div')
  row.className = 'msg-row user'
  row.innerHTML = `
    <div class="photo-bubble">
      <img src="${escHtml(objectUrl)}" alt="Ticket adjunto" />
      <div class="photo-caption">📷 ${escHtml(fileName)}</div>
    </div>
    <span class="msg-time">${now()}</span>
  `
  messagesEl.appendChild(row)
  scrollToBottom()
}

function addAgentMsg(text) {
  const html = escHtml(text)
    .replace(/\\*([^*]+)\\*/g, '<strong>$1</strong>')
  const row = document.createElement('div')
  row.className = 'msg-row agent'
  row.innerHTML = `
    <div class="bubble">${html}</div>
    <span class="msg-time">${now()}</span>
  `
  messagesEl.appendChild(row)
  scrollToBottom()
}

// ─── Confirmation card ─────────────────────────────────────────────────────────

function addConfirmationCard(card, opts = {}) {
  // Desactivar tarjetas anteriores
  document.querySelectorAll('.btn-confirm, .btn-cancel').forEach(b => {
    b.disabled = true
    b.style.cursor = 'not-allowed'
  })

  const { thumbUrl, camposDudosos = [], confianza, isPhoto } = opts

  // Tipo para el badge
  const isSend = ['enviar_recordatorio'].includes(card.action)
  const badgeClass = isPhoto ? 'card-type-photo' : (isSend ? 'card-type-send' : 'card-type-write')
  const badgeText  = isPhoto ? '📷 FOTO' : (isSend ? 'ENVÍO' : 'ESCRITURA')

  // Miniatura de la foto (solo para tarjetas de foto)
  const thumbHtml = thumbUrl
    ? `<img class="card-photo-thumb" src="${escHtml(thumbUrl)}" alt="Ticket escaneado" />`
    : ''

  // Alerta si confianza media
  const warningHtml = (isPhoto && confianza === 'media')
    ? `<div class="card-confidence-warning">
        ⚠️ Algunos campos pueden no ser exactos — revísalos antes de confirmar.
       </div>`
    : ''

  // Campos (con dudosos resaltados)
  const fieldsHtml = card.fields.map(f => {
    const labelLower = f.label.toLowerCase()
    const isDudoso = camposDudosos.some(d =>
      labelLower.includes(d.toLowerCase()) ||
      d.toLowerCase().includes(labelLower)
    )
    return `
      <div class="card-field${isDudoso ? ' dudoso' : ''}">
        <span class="field-label">${escHtml(f.label)}</span>
        <span class="field-value ${f.label === 'Importe' || f.label === 'Total' ? 'importe' : ''}">${escHtml(f.value)}</span>
      </div>
    `
  }).join('')

  // Preview mensaje (solo envíos)
  const previewHtml = card.preview ? `
    <div class="card-preview">
      <div class="card-preview-label">📱 Texto exacto que se enviará</div>
      <div class="card-preview-text">${escHtml(card.preview)}</div>
    </div>
  ` : ''

  const row = document.createElement('div')
  row.className = 'msg-row agent'
  row.innerHTML = `
    <div class="card">
      ${thumbHtml}
      <div class="card-header">
        <div>
          <div class="card-title">${escHtml(card.summary)}</div>
          <div class="card-subtitle">Revisa los datos antes de confirmar</div>
        </div>
        <span class="card-type-badge ${badgeClass}">${badgeText}</span>
      </div>
      ${warningHtml}
      <div class="card-fields">${fieldsHtml}</div>
      ${previewHtml}
      <div class="card-actions">
        <button class="btn-confirm" data-id="${escHtml(card.pending_action_id)}">✓ Confirmar</button>
        <button class="btn-cancel"  data-id="${escHtml(card.pending_action_id)}">✕ Cancelar</button>
      </div>
    </div>
    <span class="msg-time">${now()} · Caduca en 10 min</span>
  `

  row.querySelector('.btn-confirm').addEventListener('click', handleConfirm)
  row.querySelector('.btn-cancel').addEventListener('click', handleCancel)

  messagesEl.appendChild(row)
  scrollToBottom()
}

// ─── API calls ─────────────────────────────────────────────────────────────────

async function apiPost(path, body) {
  const res = await fetch(`${API}${path}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    },
    body: JSON.stringify(body),
  })
  if (!res.ok) {
    const err = await res.json().catch(() => ({}))
    throw new Error(err.error || `HTTP ${res.status}`)
  }
  return res.json()
}

// ─── Send message (texto o foto) ───────────────────────────────────────────────

async function sendMessage() {
  const text    = inputEl.value.trim()
  const hasPhoto = pendingPhoto !== null

  if (!text && !hasPhoto) return

  sendBtn.disabled = true
  inputEl.value = ''
  inputEl.style.height = 'auto'

  if (hasPhoto) {
    await sendPhoto(text)
  } else {
    await sendText(text)
  }

  sendBtn.disabled = false
  inputEl.focus()
}

// ── Envío de texto ────────────────────────────────────────────────────────────

async function sendText(text) {
  addUserMsg(text)
  setTyping('escribiendo…')

  try {
    const data = await apiPost('/api/agent/chat', { userInput: text })
    hideTyping()
    handleAgentResponse(data, {})
  } catch (err) {
    hideTyping()
    addAgentMsg(`❌ Error: ${err.message}`)
    showToast(`Error: ${err.message}`)
  }
}

// ── Envío de foto ─────────────────────────────────────────────────────────────

async function sendPhoto(extraText) {
  const photo = pendingPhoto
  const thumbUrl = photo.objectUrl  // guardar antes de limpiar

  addUserPhoto(photo.objectUrl, photo.file.name)
  if (extraText) addUserMsg(extraText)

  clearPendingPhoto()
  setTyping('leyendo el ticket…')

  try {
    const data = await apiPost('/api/agent/photo', {
      image:    photo.base64,
      mimeType: photo.mimeType,
    })
    hideTyping()
    handleAgentResponse(data, {
      thumbUrl,
      isPhoto:       true,
      camposDudosos: data.campos_dudosos || [],
      confianza:     data.confianza,
    })
    // Liberar ObjectURL si no se usa en tarjeta (si no hay card, liberar ya)
    if (data.status !== 'pending_confirmation') {
      URL.revokeObjectURL(thumbUrl)
    }
  } catch (err) {
    hideTyping()
    URL.revokeObjectURL(thumbUrl)
    addAgentMsg(`❌ Error procesando la imagen: ${err.message}`)
    showToast(`Error: ${err.message}`)
  }
}

// ── Handler de respuesta del agente ──────────────────────────────────────────

function handleAgentResponse(data, cardOpts) {
  if (data.status === 'pending_confirmation' && data.card) {
    addConfirmationCard(data.card, cardOpts)
  } else if (data.status === 'needs_info') {
    addAgentMsg(data.message)
  } else if (data.message) {
    addAgentMsg(data.message)
  } else {
    addAgentMsg('Recibido, pero no entendí la respuesta del servidor.')
  }
}

// ─── Confirm action ────────────────────────────────────────────────────────────

async function handleConfirm(e) {
  const id = e.currentTarget.dataset.id
  disableCardButtons(e.currentTarget)
  setTyping('ejecutando…')

  try {
    const data = await apiPost('/api/agent/confirm', { pending_action_id: id })
    hideTyping()

    if (data.status === 'success') {
      addAgentMsg(data.message || '✅ Hecho.')
    } else {
      addAgentMsg(`⚠️ ${data.message || 'No se pudo ejecutar.'}`)
    }
  } catch (err) {
    hideTyping()
    addAgentMsg(`❌ Error al confirmar: ${err.message}`)
  }
}

// ─── Cancel action ─────────────────────────────────────────────────────────────

async function handleCancel(e) {
  const id = e.currentTarget.dataset.id
  disableCardButtons(e.currentTarget)
  setTyping('cancelando…')

  try {
    await apiPost('/api/agent/cancel', { pending_action_id: id })
    hideTyping()
    addAgentMsg('Cancelado. No se ha guardado nada. 👍')
  } catch (err) {
    hideTyping()
    addAgentMsg(`❌ Error al cancelar: ${err.message}`)
  }
}

function disableCardButtons(btn) {
  const card = btn.closest('.card')
  if (!card) return
  card.querySelectorAll('button').forEach(b => {
    b.disabled = true
    b.style.opacity = '0.35'
    b.style.cursor = 'not-allowed'
  })
}

// ─── Input auto-resize ─────────────────────────────────────────────────────────

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto'
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px'
})

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
})

sendBtn.addEventListener('click', sendMessage)
